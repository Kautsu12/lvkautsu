<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Processos · Cadeia de Valor — METIS</title>
<link rel="icon" href="/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --canvas:#EBEEF2;--petrol:#2C6E8E;--petrol-d:#245F7C;--mid:#2B3F5C;--turq:#1FA59E;--turq-d:#0e6f69;
    --ink:#26303D;--slate:#5b6b7e;--mut:#8698a8;--line:#dde3ea;--card:#fff;--apoio:#3f7f96;
    --ok-bg:#e4f4f1;--warn:#8a5a12;--warn-bg:#faefdd;--err:#791f1f;--err-bg:#fbe9e6;
    --disp:'Space Grotesk','Segoe UI',system-ui,sans-serif;--body:'Inter','Segoe UI',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--body);color:var(--ink);background:var(--canvas);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  .top{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.94);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:10px 20px}
  .logo{display:flex;align-items:center;gap:10px}
  .logo svg{width:32px;height:32px;flex:none}
  .logo b{font-family:var(--disp);font-weight:600;letter-spacing:.16em;color:var(--mid);font-size:15px}
  .logo small{display:block;font-size:10.5px;color:var(--slate);letter-spacing:.06em}
  .top h1{font-family:var(--disp);font-weight:600;font-size:14px;color:var(--mid);margin-left:6px}
  .sp{flex:1}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;border-radius:20px;padding:4px 11px;white-space:nowrap}
  .chip.ok{color:var(--turq-d);background:var(--ok-bg)}
  .chip.pend{color:var(--warn);background:var(--warn-bg)}
  .chip.off{color:var(--err);background:var(--err-bg)}
  .btn{font-size:12.5px;font-weight:600;color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:7px 13px;background:#fff;transition:border-color .15s}
  .btn:hover{border-color:#9fb2c2}
  .btn.pri{background:var(--petrol);border-color:var(--petrol);color:#fff}
  .btn.pri:hover{background:var(--petrol-d)}
  .btn:focus-visible,.stepbtn:focus-visible,[contenteditable]:focus-visible{outline:2px solid var(--turq);outline-offset:2px}
  .wrap{max-width:1280px;margin:0 auto;padding:18px 20px 60px}
  .pagehead{text-align:center;margin-bottom:14px}
  .pagehead h2{font-family:var(--disp);font-weight:600;font-size:20px;color:var(--mid);letter-spacing:.02em;outline:none;border-radius:6px;padding:0 4px}
  .pagehead p{font-size:12px;color:var(--slate);margin-top:2px}
  .band{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:10px}
  .band-lbl{font-family:var(--disp);font-size:11px;letter-spacing:.1em;color:var(--slate);font-weight:600;margin-bottom:9px;display:flex;align-items:baseline;gap:8px}
  .band-lbl span{font-family:var(--body);letter-spacing:0;font-size:11px;color:var(--petrol);font-weight:600}
  .chain{display:flex;align-items:stretch;overflow-x:auto;padding:2px 0}
  .stepbtn{position:relative;flex:1;min-width:82px;border:none;background:transparent;padding:13px 20px 13px 16px;text-align:center;color:#fff;margin-left:-12px}
  .stepbtn:first-child{margin-left:0}
  .stepbtn svg.shape{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  .stepbtn .cd{position:relative;font-family:var(--disp);font-weight:600;font-size:10.5px;letter-spacing:.05em;opacity:.85}
  .stepbtn .nm{position:relative;font-weight:600;font-size:11.5px;margin-top:2px}
  .stepbtn.sel .cd{color:var(--turq);opacity:1}
  .stepbtn:hover{filter:brightness(1.06)}
  .mcardrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
  .mcard{border:none;border-radius:11px;color:#fff;padding:12px 12px;text-align:left;display:flex;align-items:center;gap:10px;background:var(--apoio)}
  .mcard.gest{background:var(--mid)}
  .mcard:hover{filter:brightness(1.07)}
  .mcard .sg{font-family:var(--disp);font-weight:600;font-size:11px;background:rgba(255,255,255,.16);border-radius:6px;padding:2px 8px;letter-spacing:.06em}
  .mcard .t{font-weight:600;font-size:12px;flex:1}
  .mcard .n{font-size:11px;opacity:.85}
  .empty{border:1.5px dashed #b9c5d1;border-radius:14px;padding:18px 16px;display:flex;flex-direction:column;align-items:center;text-align:center;background:var(--card)}
  .empty h4{font-family:var(--disp);font-weight:600;font-size:13px;color:var(--mid);margin-top:6px}
  .empty p{font-size:11.5px;color:var(--slate);margin-top:2px}
  .empty .btn{margin-top:10px}
  .crumb{font-size:11.5px;color:var(--slate);margin-bottom:10px}
  .crumb a{color:var(--petrol);text-decoration:none;font-weight:600;cursor:pointer}
  .crumb a:hover{text-decoration:underline}
  .phead{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin-bottom:12px}
  .phead .r1{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .badge{font-family:var(--disp);font-weight:600;background:var(--mid);color:#fff;border-radius:10px;padding:5px 11px;font-size:13px;letter-spacing:.04em}
  .phead h3{font-family:var(--disp);font-weight:600;font-size:19px;color:var(--mid);outline:none;border-radius:6px;padding:0 4px}
  .meta{display:flex;gap:18px;flex-wrap:wrap;font-size:12px;color:var(--slate);margin-top:8px;align-items:center}
  .meta b{color:var(--mid)}
  .meta [contenteditable]{outline:none;border-bottom:1px dashed transparent;padding:0 2px;border-radius:4px}
  .meta [contenteditable]:hover{border-bottom-color:#cdd8e2}
  .meta [contenteditable]:focus{background:#f2f7fb}
  select.inp,input.inp,textarea.inp{font-family:inherit;font-size:13px;color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:8px 10px;background:#fff;width:100%}
  select.inp:focus,input.inp:focus,textarea.inp:focus{outline:none;border-color:var(--petrol);background:#f8fbfd}
  .tabs{display:flex;gap:4px;margin-top:13px;background:#e9eef4;padding:4px;border-radius:12px;width:fit-content}
  .tab{font-family:var(--disp);font-weight:600;font-size:12.5px;padding:7px 15px;border-radius:9px;color:var(--slate);border:none;background:none}
  .tab.on{background:#fff;color:var(--petrol)}
  .tbl{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .trow,.thead{display:grid;grid-template-columns:34px 1fr 100px 190px 74px;gap:8px;padding:9px 14px;align-items:center}
  .thead{background:#f6f9fb;font-family:var(--disp);font-weight:600;font-size:11px;color:var(--mid);letter-spacing:.03em;border-bottom:1px solid var(--line)}
  .trow{font-size:12.5px;border-bottom:1px solid var(--line)}
  .trow:last-child{border-bottom:none}
  .trow .num{color:var(--slate);font-size:11px}
  .trow .anm{color:var(--ink);font-weight:600;outline:none;border-radius:5px;padding:1px 4px}
  .trow .anm:focus{background:#f2f7fb}
  .tag{font-size:11px;font-weight:700;border-radius:6px;padding:2px 8px;text-align:center;display:inline-block}
  .tag.manual{color:var(--slate);background:var(--canvas)}
  .tag.sistema{color:var(--turq-d);background:var(--ok-bg)}
  .tag.decisao{color:var(--warn);background:var(--warn-bg)}
  .cargo{font-size:11.5px;color:var(--petrol-d);font-weight:600}
  .ico{border:none;background:none;color:var(--mut);font-size:13px;padding:2px 5px;border-radius:6px}
  .ico:hover{color:var(--err);background:var(--err-bg)}
  .ico.mv:hover{color:var(--petrol);background:#eef5f9}
  .addline{border:1.5px dashed #c2d0dd;color:var(--petrol);border-radius:9px;padding:6px 12px;font-weight:600;font-size:11.5px;font-family:var(--disp);background:transparent;margin-top:10px}
  .addline:hover{border-color:var(--petrol)}
  .hint{font-size:11px;color:var(--slate)}
  .foot{max-width:1280px;margin:0 auto;padding:0 20px 26px;color:var(--mut);font-size:10.5px;text-align:center}
  .scrim{position:fixed;inset:0;background:rgba(20,32,46,.42);display:none;align-items:center;justify-content:center;z-index:40;padding:16px}
  .scrim.on{display:flex}
  .mbox{background:#fff;border-radius:16px;padding:22px 24px;width:min(440px,100%);max-height:88vh;overflow:auto}
  .mbox h3{font-family:var(--disp);font-weight:600;font-size:17px;color:var(--mid);display:flex;align-items:center;gap:10px}
  .mbox .msub{font-size:12px;color:var(--mut);margin:4px 0 15px}
  .field{margin-bottom:11px}
  .field label{display:block;font-size:11px;color:var(--mut);font-weight:600;margin-bottom:4px;letter-spacing:.02em}
  .frow{display:flex;gap:10px}.frow .field{flex:1}
  .mact{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
  .clist{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
  .citem{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:9px;padding:7px 11px;font-size:12.5px}
  .citem .a{color:var(--slate);font-size:11px}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(8px);background:var(--mid);color:#fff;border-radius:10px;padding:9px 16px;font-size:12.5px;font-weight:600;opacity:0;pointer-events:none;transition:.2s;z-index:50}
  .toast.on{opacity:1;transform:translateX(-50%)}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  @media(max-width:760px){.trow,.thead{grid-template-columns:26px 1fr 84px}.thead span:nth-child(4),.thead span:nth-child(5),.trow .cargo,.trow .acts{display:none}.top h1{display:none}}
  /* Dentro do sistema (iframe): o cabeçalho METIS já é do index — remove a barra da marca, mantém só os botões. */
  body.embedded .top{position:static;background:transparent;border-bottom:none;padding:8px 18px 0}
  body.embedded .top .logo,body.embedded .top h1{display:none}
  body.embedded .wrap{padding-top:6px}
</style>
</head>
<body>
<div class="top">
  <div class="logo">
    <svg viewBox="0 0 100 100" role="img" aria-label="METIS"><g stroke="#2C6E8E" stroke-width="2" opacity="0.55"><line x1="14" y1="50" x2="34" y2="34"/><line x1="34" y1="34" x2="66" y2="34"/><line x1="66" y1="34" x2="86" y2="50"/><line x1="14" y1="50" x2="34" y2="66"/><line x1="34" y1="66" x2="66" y2="66"/><line x1="66" y1="66" x2="86" y2="50"/><line x1="34" y1="34" x2="50" y2="50"/><line x1="66" y1="34" x2="50" y2="50"/><line x1="34" y1="66" x2="50" y2="50"/><line x1="66" y1="66" x2="50" y2="50"/></g><g fill="#2B3F5C"><circle cx="14" cy="50" r="4.2"/><circle cx="86" cy="50" r="4.2"/><circle cx="34" cy="34" r="4.2"/><circle cx="66" cy="34" r="4.2"/><circle cx="34" cy="66" r="4.2"/><circle cx="66" cy="66" r="4.2"/></g><circle cx="50" cy="50" r="8.5" fill="#2C6E8E"/><circle cx="50" cy="50" r="3.6" fill="#1FA59E"/></svg>
    <div><b>METIS</b><small>Auditoria · Sistema de Gestão Integrada</small></div>
  </div>
  <h1>Mapa de Processos</h1>
  <div class="sp"></div>
  <span class="chip ok" id="sync" role="status">Carregando…</span>
  <button class="btn" onclick="abrirCargos()">Cargos</button>
  <button class="btn" onclick="exportarJSON()">Exportar</button>
  <button class="btn pri" onclick="abrirNovoProc()">Novo processo</button>
</div>
<div class="wrap"><main id="app" aria-live="polite"></main></div>
<div class="foot">METIS · o vigia de cem olhos para auditoria — Mapa de Processos · Fase 1</div>
<div class="scrim" id="scrim" role="dialog" aria-modal="true"><div class="mbox" id="mbox"></div></div>
<div class="toast" id="toast"></div>
<script>
'use strict';
/* ═══ Embutido no index: esconde a barra de marca ═══ */
try{ if(window.self!==window.top) document.body.classList.add('embedded'); }
catch(e){ document.body.classList.add('embedded'); }

/* ═══ Utilidades ═══ */
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function uid(p){return p+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove('on');},2200);}

/* ═══ Estado e persistência híbrida ═══
   Servidor = fonte da verdade (/api/load e /api/save, chave SRV_KEY).
   localStorage = rascunho e cache de contingência (schema versionado). */
var SRV_KEY='mapa_sgi', LS='mapa_sgi_draft_v1', SCHEMA=1;
var state=null, view='cadeia', ativo=null, aba='ativ';
var dirty=false, offline=false, saveTimer=null;

function seed(){
  return {schema:SCHEMA, updatedAt:Date.now(), _seedO2C:true,
    cargos:[{id:'c_coord',nome:'Coordenador de produção',area:'Produção'},{id:'c_qual',nome:'Inspetor de qualidade',area:'Qualidade'}],
    macros:[
      {id:'m_vcm',sigla:'VCM',nome:'Value Chain Management',desc:'qualidade · melhoria contínua · riscos · TI',tipo:'gestao',ordem:1},
      {id:'m_o2c',sigla:'O2C',nome:'Order to Cash',desc:'do pedido ao recebimento',tipo:'primario',ordem:2},
      {id:'m_h2r',sigla:'H2R',nome:'Hire to Retire',desc:'RH · treinamento · DP',tipo:'apoio',ordem:3},
      {id:'m_p2p',sigla:'P2P',nome:'Procure to Pay',desc:'compras · contas a pagar',tipo:'apoio',ordem:4},
      {id:'m_r2r',sigla:'R2R',nome:'Record to Report',desc:'financeiro · FP&A · compliance',tipo:'apoio',ordem:5}
    ],
    processos:[
      {id:'p1',macroId:'m_o2c',codigo:'IP-001',nome:'Marketing e venda',missao:'',donoCargoId:'',ordem:1,atividades:[]},
      {id:'p2',macroId:'m_o2c',codigo:'IP-002',nome:'PCP',missao:'',donoCargoId:'',ordem:2,atividades:[]},
      {id:'p3',macroId:'m_o2c',codigo:'IP-003',nome:'Produção',missao:'',donoCargoId:'c_coord',ordem:3,atividades:[]},
      {id:'p4',macroId:'m_o2c',codigo:'IP-004',nome:'Qualidade',missao:'',donoCargoId:'c_qual',ordem:4,atividades:[]},
      {id:'p5',macroId:'m_o2c',codigo:'IP-005',nome:'Entrega',missao:'',donoCargoId:'',ordem:5,atividades:[]},
      {id:'p6',macroId:'m_o2c',codigo:'IP-006',nome:'Contas a receber',missao:'',donoCargoId:'',ordem:6,atividades:[]}
    ]};
}
function migrar(s){ if(!s||s.schema!==SCHEMA) return null; s.cargos=s.cargos||[]; s.macros=s.macros||[]; s.processos=s.processos||[]; return s; }

function setSync(mode,extra){
  var el=document.getElementById('sync');
  if(mode==='ok'){el.className='chip ok';el.textContent='Sincronizado';}
  else if(mode==='pend'){el.className='chip pend';el.textContent=(extra||'Alterações')+' a sincronizar';}
  else if(mode==='off'){el.className='chip off';el.textContent='Sem conexão — salvo no navegador';}
  else{el.className='chip ok';el.textContent=extra||'…';}
}
function draftSave(){ try{localStorage.setItem(LS,JSON.stringify(state));}catch(e){} }
function draftLoad(){ try{return migrar(JSON.parse(localStorage.getItem(LS)||'null'));}catch(e){return null;} }

function salvar(){
  state.updatedAt=Date.now(); dirty=true; draftSave(); setSync('pend','1+ alteração');
  clearTimeout(saveTimer); saveTimer=setTimeout(pushServer,1200);
}
function pushServer(){
  fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',
    body:JSON.stringify({key:SRV_KEY,value:state})})
  .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(function(){ dirty=false; offline=false; setSync('ok'); })
  .catch(function(){ offline=true; setSync('off'); });
}
function boot(){
  setSync('load','Carregando…');
  fetch('/api/load?key='+SRV_KEY,{credentials:'same-origin'})
  .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(function(j){
    var srv=migrar(j&&j.value), loc=draftLoad();
    if(srv&&loc&&loc.updatedAt>srv.updatedAt){ state=loc; setSync('pend','Rascunho local'); }
    else if(srv){ state=srv; draftSave(); setSync('ok'); }
    else { state=loc||seed(); draftSave(); if(!loc){pushServer();} else setSync('pend','Rascunho local'); }
    render();
  })
  .catch(function(){
    offline=true; state=draftLoad()||seed(); draftSave(); setSync('off'); render();
  });
}

/* ═══ Consultas ═══ */
function macroDe(p){return state.macros.find(function(m){return m.id===p.macroId;});}
function procsDo(mid){return state.processos.filter(function(p){return p.macroId===mid;}).sort(function(a,b){return (a.ordem||0)-(b.ordem||0);});}
function cargoNome(id){var c=state.cargos.find(function(x){return x.id===id;});return c?c.nome:'';}
function procAtivo(){return state.processos.find(function(p){return p.id===ativo;});}

/* ═══ Formas de seta (SVG path por etapa) ═══ */
function shapePath(pos){
  if(pos==='first') return 'M14 0 L170 0 L194 45 Q197 50 194 55 L170 100 L14 100 Q3 100 3 89 L3 11 Q3 0 14 0 Z';
  if(pos==='last')  return 'M6 0 L186 0 Q197 0 197 11 L197 89 Q197 100 186 100 L6 100 L28 55 Q31 50 28 45 Z';
  if(pos==='only')  return 'M14 0 L186 0 Q197 0 197 11 L197 89 Q197 100 186 100 L14 100 Q3 100 3 89 L3 11 Q3 0 14 0 Z';
  return 'M6 0 L170 0 L194 45 Q197 50 194 55 L170 100 L6 100 L28 55 Q31 50 28 45 Z';
}
function stepHTML(p,i,total){
  var pos= total===1?'only' : i===0?'first' : i===total-1?'last' : 'mid';
  var sel= p.id===ativo;
  var fill= sel? 'var(--mid)':'var(--petrol)';
  return '<button class="stepbtn'+(sel?' sel':'')+'" data-open="'+esc(p.id)+'" aria-label="Abrir processo '+esc(p.nome)+'">'
    +'<svg class="shape" viewBox="0 0 200 100" preserveAspectRatio="none" aria-hidden="true"><path d="'+shapePath(pos)+'" fill="'+fill+'"/></svg>'
    +'<div class="cd">'+esc(p.codigo||'IP')+'</div><div class="nm">'+esc(p.nome)+'</div></button>';
}

/* ═══ Vista 1 — Cadeia de valor ═══ */
function viewCadeia(){
  var h='<div class="pagehead"><h2>Cadeia de valor</h2><p>Raitz Galvanização · clique numa etapa para abrir o processo</p></div>';
  var gest=state.macros.filter(function(m){return m.tipo==='gestao';});
  var prim=state.macros.filter(function(m){return m.tipo==='primario';});
  var apoio=state.macros.filter(function(m){return m.tipo==='apoio';});
  gest.forEach(function(m){
    var ps=procsDo(m.id);
    h+='<div class="band"><div class="band-lbl">GESTÃO</div>'
      +'<button class="mcard gest" data-macro="'+esc(m.id)+'" style="width:100%" aria-label="Macroprocesso '+esc(m.nome)+'">'
      +'<span class="sg">'+esc(m.sigla)+'</span><span class="t">'+esc(m.nome)+'</span><span class="n">'+esc(m.desc)+'</span>'
      +'<span class="n">'+ps.length+' processo'+(ps.length===1?'':'s')+'</span></button></div>';
  });
  prim.forEach(function(m){
    var ps=procsDo(m.id);
    h+='<div class="band"><div class="band-lbl">CADEIA PRIMÁRIA <span>'+esc(m.sigla)+' · '+esc(m.nome)+' · '+ps.length+' etapas</span></div>';
    if(ps.length){ h+='<div class="chain">'+ps.map(function(p,i){return stepHTML(p,i,ps.length);}).join('')+'</div>'; }
    else{ h+='<div class="empty"><h4>Nenhuma etapa na cadeia</h4><p>Comece pelo processo que sua equipe mais usa</p><button class="btn pri" onclick="abrirNovoProc(\''+esc(m.id)+'\')">Criar processo</button></div>'; }
    h+='</div>';
  });
  h+='<div class="band"><div class="band-lbl">APOIO</div><div class="mcardrow">';
  apoio.forEach(function(m){
    var ps=procsDo(m.id);
    if(ps.length){ h+='<button class="mcard" data-macro="'+esc(m.id)+'" aria-label="Macroprocesso '+esc(m.nome)+'"><span class="sg">'+esc(m.sigla)+'</span><span class="t">'+esc(m.nome)+'</span><span class="n">'+ps.length+'</span></button>'; }
    else{ h+='<div class="empty"><h4>'+esc(m.sigla)+' · '+esc(m.nome)+' sem processos</h4><p>'+esc(m.desc)+'</p><button class="btn pri" onclick="abrirNovoProc(\''+esc(m.id)+'\')">Criar processo</button></div>'; }
  });
  h+='</div></div>';
  return h;
}

/* ═══ Vista 2 — Processo ═══ */
function tipoTag(t){var l={manual:'manual',sistema:'sistema',decisao:'decisão'};return '<span class="tag '+esc(t)+'">'+esc(l[t]||t)+'</span>';}
function viewProc(){
  var p=procAtivo(); if(!p){view='cadeia';return viewCadeia();}
  var m=macroDe(p)||{};
  var h='<div class="crumb"><a data-nav="cadeia">Cadeia de valor</a> › '+esc(m.sigla||'')+' › <b>'+esc(p.nome)+'</b></div>';
  h+='<div class="phead"><div class="r1"><span class="badge">'+esc(p.codigo||'IP')+'</span>'
    +'<h3 contenteditable="true" id="pnome" spellcheck="false">'+esc(p.nome)+'</h3><span class="sp"></span>'
    +'<button class="btn" onclick="abrirIPMCR()">Abrir IP &amp; MCR</button>'
    +'<button class="btn" onclick="removerProc()" aria-label="Excluir processo">Excluir</button></div>'
    +'<div class="meta"><span><b>Dono:</b> <select class="inp" id="pdono" style="width:auto;display:inline-block;padding:4px 8px;font-size:12px">'+selCargos(p.donoCargoId)+'</select></span>'
    +'<span style="flex:1;min-width:220px"><b>Missão:</b> <span contenteditable="true" id="pmis" spellcheck="false">'+esc(p.missao||'Qual resultado este processo entrega?')+'</span></span></div>'
    +'<div class="tabs" role="tablist">'
    +'<button class="tab on" role="tab" aria-selected="true">Atividades <span style="color:var(--slate);font-weight:500">'+p.atividades.length+'</span></button>'
    +'<button class="tab" role="tab" aria-selected="false" onclick="abrirIPMCR()">Interação IP</button>'
    +'<button class="tab" role="tab" aria-selected="false" onclick="abrirIPMCR()">Riscos MCR</button>'
    +'</div></div>';
  if(p.atividades.length){
    h+='<div class="tbl"><div class="thead"><span>Nº</span><span>ATIVIDADE</span><span>TIPO</span><span>RESPONSÁVEL · CARGO</span><span></span></div>';
    p.atividades.sort(function(a,b){return (a.ordem||0)-(b.ordem||0);}).forEach(function(a,i){
      h+='<div class="trow"><span class="num">'+String(i+1).padStart(2,'0')+'</span>'
        +'<span class="anm" contenteditable="true" spellcheck="false" data-anm="'+esc(a.id)+'">'+esc(a.nome)+'</span>'
        +'<span>'+tipoTag(a.tipo)+'</span>'
        +'<span class="cargo">'+esc(cargoNome(a.cargoId)||'— definir cargo')+'</span>'
        +'<span class="acts"><button class="ico mv" data-up="'+esc(a.id)+'" aria-label="Subir">▲</button><button class="ico mv" data-dn="'+esc(a.id)+'" aria-label="Descer">▼</button><button class="ico" data-del="'+esc(a.id)+'" aria-label="Remover">✕</button></span></div>';
    });
    h+='</div>';
  } else {
    h+='<div class="empty"><h4>Nenhuma atividade ainda</h4><p>Descreva o passo a passo deste processo — cada atividade tem um cargo responsável</p><button class="btn pri" onclick="abrirNovaAtiv()">Adicionar atividade</button></div>';
  }
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px">'
    +'<button class="addline" onclick="abrirNovaAtiv()">+ Adicionar atividade</button>'
    +'<span class="hint">Responsáveis são cargos — a saída de uma pessoa não quebra o mapa</span></div>';
  return h;
}
function selCargos(cur){
  var h='<option value="">— definir cargo</option>';
  state.cargos.forEach(function(c){h+='<option value="'+esc(c.id)+'"'+(c.id===cur?' selected':'')+'>'+esc(c.nome)+'</option>';});
  return h;
}
function abrirIPMCR(){
  var p=procAtivo(); if(!p)return;
  try{ window.top.location.href='ip-mcr.html'; }catch(e){ window.location.href='ip-mcr.html'; }
}

/* ═══ Render + eventos ═══ */
function render(){
  var app=document.getElementById('app');
  app.innerHTML = view==='proc' ? viewProc() : viewCadeia();
  app.querySelectorAll('[data-open]').forEach(function(el){el.onclick=function(){ativo=this.getAttribute('data-open');view='proc';render();};});
  app.querySelectorAll('[data-nav]').forEach(function(el){el.onclick=function(){view='cadeia';render();};});
  app.querySelectorAll('[data-macro]').forEach(function(el){el.onclick=function(){var mid=this.getAttribute('data-macro');var ps=procsDo(mid);if(ps.length){ativo=ps[0].id;view='proc';render();}};});
  var p=procAtivo();
  if(view==='proc'&&p){
    var pn=document.getElementById('pnome');
    pn.addEventListener('blur',function(){var v=this.textContent.trim();if(v){p.nome=v;salvar();}else{this.textContent=p.nome;}});
    var pm=document.getElementById('pmis');
    pm.addEventListener('focus',function(){if(this.textContent==='Qual resultado este processo entrega?')this.textContent='';});
    pm.addEventListener('blur',function(){p.missao=this.textContent.trim();salvar();});
    document.getElementById('pdono').onchange=function(){p.donoCargoId=this.value;salvar();};
    app.querySelectorAll('[data-anm]').forEach(function(el){el.addEventListener('blur',function(){
      var a=p.atividades.find(function(x){return x.id===el.getAttribute('data-anm');});
      var v=el.textContent.trim(); if(a&&v){a.nome=v;salvar();} else if(a){el.textContent=a.nome;}
    });});
    app.querySelectorAll('[data-del]').forEach(function(el){el.onclick=function(){
      var id=this.getAttribute('data-del');var a=p.atividades.find(function(x){return x.id===id;});
      if(a&&confirm('Remover a atividade "'+a.nome+'"?')){p.atividades=p.atividades.filter(function(x){return x.id!==id;});salvar();render();}
    };});
    function mover(id,d){var arr=p.atividades.sort(function(a,b){return(a.ordem||0)-(b.ordem||0);});
      var i=arr.findIndex(function(x){return x.id===id;});var j=i+d;
      if(i<0||j<0||j>=arr.length)return;
      var t=arr[i].ordem;arr[i].ordem=arr[j].ordem;arr[j].ordem=t;salvar();render();}
    app.querySelectorAll('[data-up]').forEach(function(el){el.onclick=function(){mover(this.getAttribute('data-up'),-1);};});
    app.querySelectorAll('[data-dn]').forEach(function(el){el.onclick=function(){mover(this.getAttribute('data-dn'),1);};});
  }
}

/* ═══ Modais ═══ */
function modal(html){var s=document.getElementById('scrim');document.getElementById('mbox').innerHTML=html;s.classList.add('on');
  var f=s.querySelector('input,select,textarea');if(f)f.focus();}
function fecharModal(){document.getElementById('scrim').classList.remove('on');}
document.getElementById('scrim').addEventListener('click',function(e){if(e.target===this)fecharModal();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')fecharModal();});

function abrirNovoProc(macroId){
  var opts=state.macros.slice().sort(function(a,b){return a.ordem-b.ordem;}).map(function(m){
    return '<option value="'+esc(m.id)+'"'+(m.id===macroId?' selected':'')+'>'+esc(m.sigla)+' · '+esc(m.nome)+'</option>';}).join('');
  modal('<h3>Novo processo</h3><div class="msub">O processo entra na cadeia do macroprocesso escolhido</div>'
    +'<div class="field"><label>MACROPROCESSO</label><select class="inp" id="f_macro">'+opts+'</select></div>'
    +'<div class="frow"><div class="field" style="flex:0 0 110px"><label>CÓDIGO</label><input class="inp" id="f_cod" placeholder="IP-007"></div>'
    +'<div class="field"><label>NOME DO PROCESSO</label><input class="inp" id="f_nome" placeholder="Nome do processo"></div></div>'
    +'<div class="field"><label>MISSÃO</label><textarea class="inp" id="f_mis" rows="2" placeholder="Qual resultado este processo entrega?"></textarea></div>'
    +'<div class="frow"><div class="field"><label>DONO DO PROCESSO · CARGO</label><select class="inp" id="f_dono">'+selCargos('')+'</select></div>'
    +'<div class="field" style="flex:0 0 90px"><label>ORDEM</label><input class="inp" id="f_ord" type="number" min="1" step="1" value="1"></div></div>'
    +'<div class="mact"><button class="btn" onclick="fecharModal()">Cancelar</button><button class="btn pri" onclick="criarProc()">Criar processo</button></div>');
}
function criarProc(){
  var nome=document.getElementById('f_nome').value.trim();
  if(!nome){toast('Dê um nome ao processo');return;}
  var mid=document.getElementById('f_macro').value;
  var ord=parseInt(document.getElementById('f_ord').value,10);
  var p={id:uid('p'),macroId:mid,codigo:document.getElementById('f_cod').value.trim(),nome:nome,
    missao:document.getElementById('f_mis').value.trim(),donoCargoId:document.getElementById('f_dono').value,
    ordem:isNaN(ord)?procsDo(mid).length+1:ord,atividades:[]};
  state.processos.push(p);salvar();fecharModal();ativo=p.id;view='proc';render();toast('Processo criado');
}
function removerProc(){
  var p=procAtivo();if(!p)return;
  if(!confirm('Excluir o processo "'+p.nome+'" e suas atividades?'))return;
  state.processos=state.processos.filter(function(x){return x.id!==p.id;});
  salvar();view='cadeia';ativo=null;render();toast('Processo excluído');
}
function abrirNovaAtiv(){
  var p=procAtivo();if(!p)return;
  modal('<h3>Nova atividade</h3><div class="msub">Cada atividade tem um tipo e um cargo responsável</div>'
    +'<div class="field"><label>ATIVIDADE</label><input class="inp" id="f_anome" placeholder="O que é feito neste passo?"></div>'
    +'<div class="frow"><div class="field"><label>TIPO</label><select class="inp" id="f_atipo"><option value="manual">Manual</option><option value="sistema">Sistema</option><option value="decisao">Decisão</option></select></div>'
    +'<div class="field"><label>RESPONSÁVEL · CARGO</label><select class="inp" id="f_acargo">'+selCargos('')+'</select></div></div>'
    +'<div class="mact"><button class="btn" onclick="fecharModal()">Cancelar</button><button class="btn pri" onclick="criarAtiv()">Adicionar</button></div>');
}
function criarAtiv(){
  var p=procAtivo();if(!p)return;
  var nome=document.getElementById('f_anome').value.trim();
  if(!nome){toast('Descreva a atividade');return;}
  p.atividades.push({id:uid('a'),nome:nome,tipo:document.getElementById('f_atipo').value,
    cargoId:document.getElementById('f_acargo').value,ordem:p.atividades.length+1});
  salvar();fecharModal();render();toast('Atividade adicionada');
}
function abrirCargos(){
  var lis=state.cargos.map(function(c){
    var uso=state.processos.some(function(p){return p.donoCargoId===c.id||p.atividades.some(function(a){return a.cargoId===c.id;});});
    return '<div class="citem"><span style="flex:1;font-weight:600">'+esc(c.nome)+'</span><span class="a">'+esc(c.area||'')+'</span>'
      +(uso?'<span class="a">em uso</span>':'<button class="ico" data-cdel="'+esc(c.id)+'" aria-label="Remover cargo">✕</button>')+'</div>';}).join('');
  modal('<h3>Cargos</h3><div class="msub">Responsáveis são sempre cargos — a saída de uma pessoa não quebra o mapa</div>'
    +'<div class="clist">'+(lis||'<div class="msub">Nenhum cargo cadastrado.</div>')+'</div>'
    +'<div class="frow"><div class="field"><label>NOVO CARGO</label><input class="inp" id="f_cnome" placeholder="Ex.: Operador de galvanização"></div>'
    +'<div class="field" style="flex:0 0 140px"><label>ÁREA</label><input class="inp" id="f_carea" placeholder="Ex.: Produção"></div></div>'
    +'<div class="mact"><button class="btn" onclick="fecharModal()">Fechar</button><button class="btn pri" onclick="criarCargo()">Adicionar cargo</button></div>');
  document.querySelectorAll('[data-cdel]').forEach(function(el){el.onclick=function(){
    var id=this.getAttribute('data-cdel');state.cargos=state.cargos.filter(function(c){return c.id!==id;});salvar();abrirCargos();};});
}
function criarCargo(){
  var nome=document.getElementById('f_cnome').value.trim();
  if(!nome){toast('Dê um nome ao cargo');return;}
  state.cargos.push({id:uid('c'),nome:nome,area:document.getElementById('f_carea').value.trim()});
  salvar();abrirCargos();toast('Cargo adicionado');
}
function exportarJSON(){
  var blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='mapa-processos-'+new Date().toISOString().slice(0,10)+'.json';a.click();
  setTimeout(function(){URL.revokeObjectURL(a.href);},2000);
}
window.addEventListener('online',function(){if(dirty)pushServer();});
window.addEventListener('beforeunload',function(){if(dirty)draftSave();});
boot();
</script>
