<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>METIS · Central SGI — Acesso restrito</title>
<link rel="icon" href="/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#e8eef3; --grid:rgba(44,110,142,.06); --glow:rgba(31,165,158,.12);
    --card:#ffffff; --line:#e7ecf2; --shadow:0 30px 70px -30px rgba(34,48,63,.45);
    --ink:#22303f; --muted:#8698a8; --slate:#5b6b7e;
    --rule:#e6ebf1; --petrol:#2C6E8E; --midnight:#2B3F5C; --turq:#1FA59E;
    --btn-bg:#fff; --btn-line:#cdd8e2; --btn-ink:#243141; --btn-bg-h:#f5f9fc; --btn-line-h:#9fb2c2;
    --err-bg:#fdeced; --err-ink:#b42d2d; --err-line:#f4cccd;
  }
  body.dark{
    --bg:#1A2230; --grid:rgba(255,255,255,.04); --glow:rgba(31,165,158,.16);
    --card:#141d2b; --line:#26344a; --shadow:0 30px 70px -28px rgba(0,0,0,.7);
    --ink:#e9eef6; --muted:#7f92a6; --slate:#9fb0c2;
    --rule:#243248; --petrol:#4A90AE; --midnight:#cdd8e6; --turq:#2FD0C6;
    --btn-bg:#182335; --btn-line:#33465e; --btn-ink:#e7eef7; --btn-bg-h:#1e2c41; --btn-line-h:#46607c;
    --err-bg:#3a1b1c; --err-ink:#fca5a5; --err-line:#5a2a2b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;color:var(--ink);
    background-color:var(--bg);
    background-image:
      radial-gradient(880px 440px at 50% -12%, var(--glow), transparent 70%),
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size:100% 100%, 30px 30px, 30px 30px;
    display:flex;align-items:center;justify-content:center;padding:24px;
    transition:background-color .25s ease;
  }
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:20px;
    padding:34px 34px 26px;width:400px;max-width:94vw;text-align:center;
    box-shadow:var(--shadow);position:relative;
  }
  .mascot{width:104px;height:auto;margin:2px auto 12px;display:block;filter:drop-shadow(0 10px 18px rgba(34,48,63,.12))}
  .brandrow{display:flex;align-items:center;justify-content:center;gap:10px}
  .brandrow img{width:26px;height:26px;display:block}
  .wordmark{font-family:'Space Grotesk','Segoe UI',sans-serif;font-weight:600;
    font-size:27px;letter-spacing:.16em;text-transform:uppercase;color:var(--midnight)}
  .tagline{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.2em;margin-top:8px}
  .rule{height:1px;background:var(--rule);margin:20px 0 15px}
  .eyebrow{font-size:12px;font-weight:600;color:var(--slate);margin-bottom:15px}
  .err{background:var(--err-bg);color:var(--err-ink);border:1px solid var(--err-line);
    padding:10px 13px;border-radius:10px;font-size:13px;margin-bottom:14px;display:none;text-align:left;line-height:1.4}
  .btn{width:100%;padding:13px 16px;background:var(--btn-bg);border:1.5px solid var(--btn-line);
    border-radius:12px;font-size:15px;font-weight:600;color:var(--btn-ink);cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:11px;
    transition:background .15s,border-color .15s,box-shadow .15s,transform .06s}
  .btn:hover{background:var(--btn-bg-h);border-color:var(--btn-line-h);box-shadow:0 8px 20px -10px rgba(34,48,63,.4)}
  .btn:active{transform:translateY(1px)}
  .btn:focus-visible{outline:none;box-shadow:0 0 0 3px var(--turq)}
  .helper{font-size:12.5px;color:var(--slate);margin-top:14px}
  .foot{font-size:11px;color:var(--muted);margin-top:22px}
  .credit{position:fixed;bottom:14px;left:0;right:0;text-align:center;color:var(--muted);opacity:.7;font-size:10px;padding:0 12px}
  .theme-btn{position:fixed;bottom:16px;right:16px;z-index:9999;width:42px;height:42px;border-radius:50%;
    border:1px solid var(--line);cursor:pointer;background:var(--card);color:var(--ink);font-size:17px;line-height:1;
    box-shadow:0 8px 20px -8px rgba(0,0,0,.4)}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <main class="card">
    <img class="mascot" src="/assets/mascot/metis-mascote-vigia.svg" alt="Mascote METIS — coruja vigia">
    <div class="brandrow">
      <img src="/assets/metis-icon.svg" alt="">
      <span class="wordmark">METIS</span>
    </div>
    <div class="tagline">Central SGI · Sistema de Gestão Integrada</div>

    <div class="rule"></div>
    <div class="eyebrow">Acesso restrito</div>

    <div class="err" id="err" role="alert"></div>

    <button class="btn" onclick="entrarMs()">
      <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-0.792 2.237-2.231 4.166-4.087 5.571l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
      Entrar com conta Google
    </button>

    <div class="helper">Use sua conta Google autorizada.</div>
    <div class="foot">Apenas usuários autorizados têm acesso.</div>
  </main>
  <div class="credit">METIS · desenvolvido por Ayrton Ribeiro e Jucelio F. Santos.</div>

<button id="thBtn" class="theme-btn" onclick="tgTheme()" title="Tema claro/escuro" aria-label="Alternar tema">🌙</button>
<script>
function entrarMs(){ window.location.href='/api/auth?action=ms-login'; }
(function(){
  var e=new URLSearchParams(window.location.search).get('error');
  if(e){ var el=document.getElementById('err'); el.textContent=e; el.style.display='block'; }
})();
</script>
<script src="/assets/tema.js"></script>
</body>
</html>
