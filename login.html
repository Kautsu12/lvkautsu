<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central SGI — Acesso restrito</title>
<style>
  :root{
    --bg:#e9eef5; --grid:rgba(14,35,54,.045); --glow:rgba(37,99,235,.10);
    --card:#ffffff; --card-line:#e7ecf3; --card-shadow:0 30px 70px -28px rgba(14,35,54,.45);
    --ink:#0e2336; --muted:#5b6b7e; --faint:#90a0b3;
    --line:#e2e8f0; --tile1:#13314f; --tile2:#0b2238; --check:#34d399;
    --btn-bg:#ffffff; --btn-line:#cdd7e3; --btn-ink:#1f2d3d; --btn-bg-h:#f6f9fc; --btn-line-h:#93a4b8;
    --ring:#2563eb; --err-bg:#fdeaea; --err-ink:#b42323; --err-line:#f6c9c9;
  }
  body.dark{
    --bg:#0a1422; --grid:rgba(255,255,255,.035); --glow:rgba(37,99,235,.16);
    --card:#111d2e; --card-line:#21344b; --card-shadow:0 30px 70px -26px rgba(0,0,0,.7);
    --ink:#eaf0f8; --muted:#90a4ba; --faint:#64778d;
    --line:#243a52; --tile1:#1b3a5c; --tile2:#0d2236; --check:#34d399;
    --btn-bg:#16263b; --btn-line:#33485f; --btn-ink:#e6edf6; --btn-bg-h:#1c3149; --btn-line-h:#46607c;
    --ring:#5b8bff; --err-bg:#3a1b1b; --err-ink:#fca5a5; --err-line:#5a2a2a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;color:var(--ink);
    background-color:var(--bg);
    background-image:
      radial-gradient(900px 460px at 50% -10%, var(--glow), transparent 70%),
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size:100% 100%, 30px 30px, 30px 30px;
    display:flex;align-items:center;justify-content:center;padding:24px;
    transition:background-color .25s ease;
  }
  .card{
    background:var(--card);border:1px solid var(--card-line);border-radius:20px;
    padding:38px 34px 26px;width:392px;max-width:94vw;text-align:center;
    box-shadow:var(--card-shadow);position:relative;
  }
  /* Selo de conformidade — o elemento-assinatura */
  .seal{
    width:62px;height:62px;margin:0 auto 18px;border-radius:16px;
    background:linear-gradient(155deg,var(--tile1),var(--tile2));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 10px 22px -8px rgba(11,34,56,.55), inset 0 1px 0 rgba(255,255,255,.08);
  }
  .seal svg{width:30px;height:30px}
  .wordmark{font-size:25px;font-weight:700;letter-spacing:-.02em;line-height:1.05}
  .wordmark b{color:var(--ink)}
  .wordmark span{color:var(--ring)}
  .tagline{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.22em;margin-top:7px}
  .rule{height:1px;background:var(--line);margin:22px 0 16px}
  .eyebrow{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.02em;margin-bottom:16px}
  .err{
    background:var(--err-bg);color:var(--err-ink);border:1px solid var(--err-line);
    padding:10px 13px;border-radius:10px;font-size:13px;margin-bottom:15px;display:none;text-align:left;line-height:1.4;
  }
  .btn{
    width:100%;padding:13px 16px;background:var(--btn-bg);border:1.5px solid var(--btn-line);
    border-radius:12px;font-size:15px;font-weight:600;color:var(--btn-ink);cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:11px;
    transition:background .15s,border-color .15s,box-shadow .15s,transform .06s;
  }
  .btn:hover{background:var(--btn-bg-h);border-color:var(--btn-line-h);box-shadow:0 8px 20px -10px rgba(14,35,54,.4)}
  .btn:active{transform:translateY(1px)}
  .btn:focus-visible{outline:none;box-shadow:0 0 0 3px var(--ring)}
  .helper{font-size:12.5px;color:var(--muted);margin-top:15px}
  .foot{font-size:11px;color:var(--faint);margin-top:24px}
  .credit{position:fixed;bottom:14px;left:0;right:0;text-align:center;color:var(--faint);opacity:.7;font-size:10px;padding:0 12px}
  .theme-btn{
    position:fixed;bottom:16px;right:16px;z-index:9999;width:42px;height:42px;border-radius:50%;
    border:1px solid var(--card-line);cursor:pointer;background:var(--card);color:var(--ink);
    font-size:17px;line-height:1;box-shadow:0 8px 20px -8px rgba(0,0,0,.4)}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <main class="card">
    <div class="seal" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--check)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
    </div>
    <div class="wordmark"><b>Central</b> <span>SGI</span></div>
    <div class="tagline">Sistema de Gestão Integrada</div>

    <div class="rule"></div>
    <div class="eyebrow">Acesso restrito</div>

    <div class="err" id="err" role="alert"></div>

    <button class="btn" onclick="entrarMs()">
      <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-0.792 2.237-2.231 4.166-4.087 5.571l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
      Entrar com conta Google
    </button>

    <div class="helper">Use sua conta Google autorizada.</div>
    <div class="foot">Apenas usuários autorizados têm acesso.</div>
  </main>
  <div class="credit">Desenvolvido por Ayrton Ribeiro e Jucelio F. Santos.</div>

<button id="thBtn" class="theme-btn" onclick="tgTheme()" title="Tema claro/escuro" aria-label="Alternar tema">🌙</button>
<script>
function entrarMs(){ window.location.href='/api/auth?action=ms-login'; }
(function(){
  var e=new URLSearchParams(window.location.search).get('error');
  if(e){ var el=document.getElementById('err'); el.textContent=e; el.style.display='block'; }
})();
</script>
<script src="/assets/tema.js"></script>
</body>
</html>
