<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escopo · Auditoria — METIS</title>
<link rel="icon" href="/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --petrol:#2C6E8E;--petrol-d:#245F7C;--mid:#2B3F5C;--turq:#1FA59E;--turq-d:#0e6f69;
    --ink:#22303f;--slate:#5b6b7e;--mut:#8698a8;--line:#e5ebf1;--bg:#eef2f6;--card:#fff;
    --lo:#1FA59E;--lo-bg:#e4f4f1;--med:#c8781c;--med-bg:#faefdd;--hi:#c0392b;--hi-bg:#fbe9e6;
    --disp:'Space Grotesk','Segoe UI',system-ui,sans-serif;--body:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--body);color:var(--ink);background:radial-gradient(1100px 520px at 80% -10%, rgba(31,165,158,.08), transparent 60%),var(--bg)}
  .top{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:11px 22px}
  .logo{display:flex;align-items:center;gap:10px}.logo img{width:30px;height:30px}
  .logo b{font-family:var(--disp);font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);font-size:16px}
  .logo small{display:block;font-size:10px;color:var(--mut);letter-spacing:.08em;margin-top:1px}
  .top h1{font-family:var(--disp);font-weight:600;font-size:15px;color:var(--mid);margin-left:6px}
  .sp{flex:1}.st{font-size:12px;color:var(--turq-d);min-width:52px}
  .btn{font-family:var(--body);font-size:13px;font-weight:600;cursor:pointer;padding:8px 14px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--ink);display:inline-flex;align-items:center;gap:7px;transition:.15s}
  .btn:hover{border-color:#9fb2c2;box-shadow:0 8px 20px -12px rgba(34,48,63,.45)}
  .btn.pri{background:var(--petrol);border-color:var(--petrol);color:#fff}.btn.pri:hover{background:var(--petrol-d)}
  .btn.gh{border-color:transparent;background:transparent;padding:5px 8px}.btn.sm{padding:5px 9px;font-size:12px}
  .wrap{display:grid;grid-template-columns:280px 1fr;gap:20px;max-width:1500px;margin:0 auto;padding:20px 22px 70px}
  .aside{align-self:start;position:sticky;top:76px}
  .aside h2{font-family:var(--disp);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin:2px 4px 10px}
  .plist{display:flex;flex-direction:column;gap:8px}
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
  .pcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:transparent}
  .pcard:hover{border-color:#c6d4e0;transform:translateY(-1px)}.pcard.on{border-color:var(--petrol)}.pcard.on::before{background:var(--turq)}
  .pcard .cod{font-family:var(--disp);font-weight:600;font-size:11px;color:var(--petrol);letter-spacing:.06em}
  .pcard .nm{font-weight:600;font-size:14px;color:var(--mid);margin-top:2px}
  .pcard .meta{font-size:11px;color:var(--mut);margin-top:6px;display:flex;gap:10px;flex-wrap:wrap}
  .addp{width:100%;border:1.5px dashed #c2d0dd;background:transparent;color:var(--slate);border-radius:14px;padding:12px;cursor:pointer;font-weight:600;font-size:13px}
  .addp:hover{border-color:var(--petrol);color:var(--petrol)}
  .main{min-width:0}
  .phead{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:16px;box-shadow:0 1px 2px rgba(34,48,63,.04)}
  .phead .row1{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .badge{font-family:var(--disp);font-weight:600;background:var(--mid);color:#fff;border-radius:10px;padding:5px 11px;font-size:12px;letter-spacing:.04em}
  .phead h3{font-family:var(--disp);font-size:20px;color:var(--mid);outline:none}
  .metaline{display:flex;flex-wrap:wrap;gap:6px 22px;margin-top:10px;font-size:12px;color:var(--slate)}
  .metaline b{color:var(--mid);font-family:var(--disp);font-weight:600}
  .metaline [contenteditable]{outline:none;border-bottom:1px dashed transparent;padding:0 2px;min-width:36px;display:inline-block}
  .metaline [contenteditable]:hover{border-bottom-color:#cdd8e2}.metaline [contenteditable]:focus{border-bottom-color:var(--petrol);background:#f2f7fb}
  .tabs{display:flex;gap:4px;margin:16px 0 4px;background:#e9eef4;padding:4px;border-radius:12px;width:fit-content;flex-wrap:wrap}
  .tab{font-family:var(--disp);font-weight:600;font-size:13px;padding:8px 15px;border:none;background:none;color:var(--slate);border-radius:9px;cursor:pointer;transition:.15s}
  .tab.on{background:#fff;color:var(--petrol);box-shadow:0 2px 8px -4px rgba(34,48,63,.3)}
  .panel{display:none}.panel.on{display:block;animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  /* KPIs */
  .kpis{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 16px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 14px;min-width:120px;flex:1;position:relative;overflow:hidden}
  .kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--petrol)}
  .kpi.ok::before{background:var(--turq)}.kpi.med::before{background:var(--med)}
  .kpi .n{font-family:var(--disp);font-weight:700;font-size:23px;color:var(--mid);line-height:1}
  .kpi .l{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin-top:6px;font-weight:600}
  /* Normas layout */
  .cols{display:grid;grid-template-columns:270px 1fr;gap:16px}
  .box{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .box h4{font-family:var(--disp);font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--mid);padding:13px 15px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .nlist{display:flex;flex-direction:column;padding:8px}
  .nitem{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:.12s}
  .nitem:hover{background:#f5f9fc}.nitem.on{background:#eaf1f7}
  .nitem .nm{flex:1;font-weight:600;font-size:13px;color:var(--mid)}
  .nitem .ct{font-size:11px;color:var(--turq-d);font-weight:700}
  .nitem .x{opacity:0;color:var(--mut);cursor:pointer;font-size:12px}.nitem:hover .x{opacity:.6}.nitem .x:hover{color:var(--hi)}
  .items{padding:6px 8px;max-height:60vh;overflow:auto}
  .irow{display:flex;align-items:flex-start;gap:10px;padding:9px 11px;border-radius:9px;cursor:pointer}
  .irow:hover{background:#f6fafc}
  .ck{width:19px;height:19px;border-radius:6px;border:2px solid #c2d0dd;flex:none;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:.12s}
  .irow.sel .ck{background:var(--turq);border-color:var(--turq)}
  .ck svg{width:12px;height:12px;stroke:#fff;stroke-width:3;fill:none;opacity:0}.irow.sel .ck svg{opacity:1}
  .irow .cd{font-family:var(--disp);font-weight:700;font-size:12px;color:var(--petrol);min-width:34px}
  .irow .ti{font-size:12.5px;color:var(--ink);flex:1;line-height:1.35}
  .irow.sel .ti{color:var(--mid);font-weight:600}
  .additem{display:flex;gap:8px;padding:10px}
  .additem input{flex:1;border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-family:inherit;font-size:12.5px}
  .additem input:focus{outline:none;border-color:var(--petrol)}
  .empty{color:var(--mut);font-size:13px;text-align:center;padding:30px 16px}
  /* Processos */
  table{border-collapse:collapse;width:100%;font-size:13px}
  th{background:#f6f9fb;text-align:left;padding:10px 12px;color:var(--mid);font-family:var(--disp);font-weight:600;font-size:11px;letter-spacing:.03em;border-bottom:1px solid var(--line)}
  td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
  td [contenteditable]{outline:none;border-radius:5px;padding:2px 5px;display:inline-block;min-width:120px}td [contenteditable]:focus{background:#f2f7fb}
  .tag{font-size:10.5px;font-weight:700;border-radius:20px;padding:3px 10px;display:inline-block}
  .tag.on{background:var(--lo-bg);color:var(--turq-d)}.tag.off{background:#eef2f6;color:var(--mut)}
  .setor{font-family:var(--disp);font-weight:700;font-size:10px;color:var(--petrol);background:#e7eef6;border-radius:6px;padding:2px 7px}
  /* Resumo */
  .rescols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .reqlist{display:flex;flex-direction:column;gap:5px;max-height:52vh;overflow:auto;padding-right:4px}
  .req{display:flex;gap:8px;align-items:baseline;font-size:12.5px;padding:5px 8px;border-radius:7px;background:#f6f9fb}
  .req b{font-family:var(--disp);color:var(--petrol);min-width:34px}
  .gridwrap{overflow:auto;border:1px solid var(--line);border-radius:12px;background:var(--card)}
  .grid{border-collapse:collapse;font-size:11px}
  .grid th,.grid td{border:1px solid var(--line);padding:5px 7px;text-align:center;white-space:nowrap}
  .grid th.req{background:#f6f9fb;text-align:left;position:sticky;left:0;z-index:1}
  .grid td.rq{text-align:left;font-family:var(--disp);font-weight:600;color:var(--mid);position:sticky;left:0;background:#fff;z-index:1}
  .cellx{font-family:var(--disp);font-weight:700;color:var(--turq-d);cursor:pointer}
  .cellna{color:var(--mut);cursor:pointer}
  .note{font-size:11.5px;color:var(--mut);margin-top:10px;line-height:1.5}
  .foot{max-width:1500px;margin:0 auto;padding:0 22px 30px;color:var(--mut);font-size:11px;text-align:center}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  @media(max-width:960px){.wrap{grid-template-columns:1fr}.cols{grid-template-columns:1fr}.rescols{grid-template-columns:1fr}}
  /* Painel (drawer) da célula + revisão */
  .scrim{position:fixed;inset:0;background:rgba(20,32,46,.42);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:.2s;z-index:40}
  .scrim.on{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(460px,94vw);background:var(--card);border-left:1px solid var(--line);box-shadow:-24px 0 60px -30px rgba(20,32,46,.55);transform:translateX(101%);transition:transform .24s cubic-bezier(.4,0,.2,1);z-index:41;display:flex;flex-direction:column}
  .drawer.on{transform:none}
  .dhead{padding:17px 22px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:12px}
  .dhead .dt{flex:1;min-width:0}.dhead h3{font-family:var(--disp);font-size:16px;color:var(--mid);line-height:1.3}
  .dhead .dsub{font-family:var(--disp);font-size:11px;font-weight:700;color:var(--petrol);letter-spacing:.04em;margin-bottom:3px}
  .dhead .dclose{cursor:pointer;color:var(--mut);font-size:20px;line-height:1;padding:2px 6px;border-radius:8px}.dhead .dclose:hover{background:#f0f4f8;color:var(--ink)}
  .dbody{padding:16px 22px 34px;overflow-y:auto;flex:1}
  .dsec{margin-bottom:20px}
  .dsec .st2{font-family:var(--disp);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--turq-d);margin-bottom:10px}
  .dsec .st2 small{font-family:var(--body);letter-spacing:0;text-transform:none;color:var(--mut);font-weight:400}
  .toggle2{display:flex;gap:8px}
  .tg{flex:1;border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px;font-family:var(--disp);font-weight:600;font-size:13px;color:var(--slate);cursor:pointer}
  .tg.on{background:var(--lo-bg);border-color:#8fd3ca;color:var(--turq-d)}
  .tg.onna{background:#eef2f6;border-color:#c2d0dd;color:var(--slate)}
  .lns{display:flex;flex-direction:column;gap:6px;margin-bottom:6px}
  .ln{display:flex;gap:8px;align-items:flex-start;background:#f6f9fb;border-radius:9px;padding:8px 10px}
  .ln .lt{flex:1;font-size:13px;color:var(--ink);outline:none;line-height:1.4}.ln .lt:focus{background:#fff;border-radius:5px}
  .ln .lx{color:var(--mut);cursor:pointer;font-size:11px;opacity:.5}.ln .lx:hover{color:var(--hi);opacity:1}
  .lnempty{color:var(--mut);font-size:12.5px;padding:4px 2px}
  .addln{font-size:12px;color:var(--petrol);font-weight:600;cursor:pointer;font-family:var(--disp)}
  .qd{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--turq);margin-left:5px;vertical-align:middle}
  .revtag{font-family:var(--disp);font-weight:700;font-size:10.5px;color:var(--petrol);background:#e7eef6;border-radius:6px;padding:2px 7px}
  .tag.rev{background:var(--med-bg);color:var(--med)}
  /* Dentro do sistema (iframe): o cabeçalho METIS já é do index — remove a barra da marca por completo. */
  body.embedded .top{position:static;background:transparent;border-bottom:none;box-shadow:none;backdrop-filter:none;padding:8px 18px 0}
  body.embedded .top .logo,body.embedded .top h1{display:none}
  body.embedded .wrap{padding-top:4px}
  body.embedded .aside{top:14px}
</style>
</head>
<body>
<div class="top">
  <div class="logo"><img src="/assets/metis-icon.svg" alt="" onerror="this.style.display='none'"><div><b>METIS</b><small>Central SGI</small></div></div>
  <h1>Escopo · Auditoria</h1>
  <div class="sp"></div><span class="st" id="st"></span>
  <button class="btn pri" onclick="salvar(true)">Salvar</button>
</div>
<div class="wrap">
  <aside class="aside"><h2>Escopos (empresas)</h2><div class="plist" id="plist"></div><div style="height:8px"></div><button class="addp" onclick="addEscopo()">＋ Novo escopo</button></aside>
  <main class="main" id="main"></main>
</div>
<div class="foot">Escopo — define normas/itens (requisitos) e processos (setores) que alimentam o Programa de Auditoria · dados no navegador.</div>
<div class="scrim" id="scrim" onclick="closeCelula()"></div>
<aside class="drawer" id="drawer"></aside>
<script>
var LS='escopo_v1', MAPA_LS='ip_mcr_v2';
var state=null, ativo=null, aba='normas', normaSel=null;
function uid(p){return p+Math.random().toString(36).slice(2,7);}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
/* ── Biblioteca base de normas ── */
function itensDe(pares){return pares.map(function(a){return {codigo:a[0],titulo:a[1],sel:false};});}
var NORMA_BASE={
 'ISO 9001:2015':itensDe([['4.1','Contexto da organização'],['4.2','Partes interessadas'],['4.3','Escopo do SGQ'],['4.4','SGQ e seus processos'],['5.1','Liderança e comprometimento'],['5.2','Política'],['5.3','Papéis e responsabilidades'],['6.1','Ações para riscos e oportunidades'],['6.2','Objetivos da qualidade'],['6.3','Planejamento de mudanças'],['7.1','Recursos'],['7.2','Competência'],['7.3','Conscientização'],['7.4','Comunicação'],['7.5','Informação documentada'],['8.1','Planejamento e controle operacional'],['8.2','Requisitos de produtos e serviços'],['8.3','Projeto e desenvolvimento'],['8.4','Controle de processos e produtos externos'],['8.5','Produção e provisão de serviço'],['8.6','Liberação de produtos e serviços'],['8.7','Controle de saídas não conformes'],['9.1','Monitoramento, medição e análise'],['9.2','Auditoria interna'],['9.3','Análise crítica pela direção'],['10.1','Melhoria — geral'],['10.2','Não conformidade e ação corretiva'],['10.3','Melhoria contínua']]),
 'ISO 14001:2015':itensDe([['4.1','Contexto da organização'],['4.2','Partes interessadas'],['4.3','Escopo do SGA'],['4.4','SGA'],['5.1','Liderança e comprometimento'],['5.2','Política ambiental'],['5.3','Papéis e responsabilidades'],['6.1','Riscos, aspectos e requisitos legais'],['6.2','Objetivos ambientais'],['7.1','Recursos'],['7.2','Competência'],['7.3','Conscientização'],['7.4','Comunicação'],['7.5','Informação documentada'],['8.1','Planejamento e controle operacional'],['8.2','Preparação e resposta a emergências'],['9.1','Monitoramento e avaliação do atendimento legal'],['9.2','Auditoria interna'],['9.3','Análise crítica pela direção'],['10.2','Não conformidade e ação corretiva'],['10.3','Melhoria contínua']]),
 'ISO 45001:2018':itensDe([['4.1','Contexto da organização'],['4.2','Partes interessadas'],['4.3','Escopo do SGSST'],['4.4','SGSST'],['5.1','Liderança e comprometimento'],['5.2','Política de SST'],['5.3','Papéis e responsabilidades'],['5.4','Consulta e participação'],['6.1','Perigos, riscos e requisitos legais'],['6.2','Objetivos de SST'],['7.1','Recursos'],['7.2','Competência'],['7.3','Conscientização'],['7.4','Comunicação'],['7.5','Informação documentada'],['8.1','Planejamento e controle operacional'],['8.2','Preparação e resposta a emergências'],['9.1','Monitoramento e avaliação legal'],['9.2','Auditoria interna'],['9.3','Análise crítica pela direção'],['10.2','Incidente, não conformidade e ação corretiva'],['10.3','Melhoria contínua']])
};
function normaFromBase(nome,selCods){var base=(NORMA_BASE[nome]||[]).map(function(it){return {codigo:it.codigo,titulo:it.titulo,sel:selCods?selCods.indexOf(it.codigo)>=0:false};});return {id:uid('n'),nome:nome,itens:base};}
/* ── Estado ── */
function seed(){
 var e={id:uid('e'),empresa:'Raitz Galvanização',nome:'Serviço de galvanização a fogo',rev:'01',data:'',
  normas:[normaFromBase('ISO 9001:2015',['4.1','5.1','6.1','8.1','8.5','8.6','9.1','9.2','9.3']),normaFromBase('ISO 14001:2015',['6.1','8.1','8.2','9.2'])],
  processos:[{id:uid('p'),nome:'Realização do serviço'},{id:uid('p'),nome:'PCP'},{id:uid('p'),nome:'Infraestrutura'}],
  grade:{},ind:{},historico:[]};
 var it85=e.normas[0].itens.find(function(x){return x.codigo==='8.5';});
 if(it85){it85.pool=['A produção segue os POP/FIT vigentes?','Os registros de processo estão sendo mantidos?'];it85.docs=['POP de produção','Ordem de Produção','Registros de inspeção'];}
 return {escopos:[e],ativo:e.id};
}
function carregar(){try{var r=localStorage.getItem(LS);if(r)state=JSON.parse(r);}catch(e){}if(!state||!state.escopos||!state.escopos.length)state=seed();migrarEsc();ativo=state.ativo||state.escopos[0].id;E().normas.forEach(function(n){if(!n.id)n.id=uid('n');});normaSel=E().normas[0]?E().normas[0].id:null;}
function salvar(m){try{state.ativo=ativo;localStorage.setItem(LS,JSON.stringify(state));}catch(e){}if(m)flash('Salvo ✓');}
function flash(m){var e=document.getElementById('st');e.textContent=m;clearTimeout(window._t);window._t=setTimeout(function(){e.textContent='';},2200);}
function E(){return state.escopos.find(function(x){return x.id===ativo;})||state.escopos[0];}
/* ── Interop com o Mapa de Processos (mesma origem, mesmo localStorage) ── */
function mapaProcs(){try{var r=localStorage.getItem(MAPA_LS);if(!r)return[];var s=JSON.parse(r);return (s.processos||[]).map(function(p){var ip=p.ip||{};var n=0;['recursos','dono','maoDeObra','origem','entradas','atividades','saidas','destino','metodos','medicao'].forEach(function(k){if(Array.isArray(ip[k]))n+=ip[k].length;});return {nome:p.nome,temIP:n>0||!!(p.missao&&p.missao.trim()),temMCR:(p.mcr&&p.mcr.length>0)};});}catch(e){return[];}}
function statusProc(nome){var list=mapaProcs();var alvo=(nome||'').trim().toLowerCase();for(var i=0;i<list.length;i++){if(list[i].nome&&list[i].nome.trim().toLowerCase()===alvo)return list[i];}return {temIP:false,temMCR:false,ausente:true};}
/* ── Contadores ── */
function reqCount(e){return (e.normas||[]).reduce(function(a,n){return a+(n.itens||[]).filter(function(i){return i.sel;}).length;},0);}
function reqList(e){var out=[];(e.normas||[]).forEach(function(n){(n.itens||[]).forEach(function(i){if(i.sel)out.push({norma:n.nome,codigo:i.codigo,titulo:i.titulo});});});return out;}
/* ── Revisão e histórico (item 4 da LV Mestra) ── */
function incRev(r){var n=parseInt(String(r||'0').replace(/\D/g,''),10)||0;n++;return (n<10?'0':'')+n;}
function hoje(){var d=new Date();function z(x){return (x<10?'0':'')+x;}return z(d.getDate())+'/'+z(d.getMonth()+1)+'/'+d.getFullYear()+' '+z(d.getHours())+':'+z(d.getMinutes());}
function logHist(acao,revisa){var e=E();e.historico=e.historico||[];if(revisa)e.rev=incRev(e.rev);e.historico.unshift({rev:e.rev,quando:hoje(),acao:acao,revisou:!!revisa});salvar();}
function findItem(e,norma,codigo){var n=(e.normas||[]).find(function(x){return x.nome===norma;});if(!n)return null;return (n.itens||[]).find(function(x){return String(x.codigo)===String(codigo);})||null;}
function procNomeById(e,id){var p=(e.processos||[]).find(function(x){return x.id===id;});return p?p.nome:'—';}
function parseCel(k){var a=String(k).split('||');var np=a[0].split('|');return {norma:np[0],codigo:np[1],proc:a[1],key:k};}
function migrarEsc(){(state.escopos||[]).forEach(function(e){if(!e.historico)e.historico=[];if(!e.ind)e.ind={};if(!e.grade)e.grade={};if(!e.rev)e.rev='01';if(!e.cel)e.cel={};
 Object.keys(e.ind).forEach(function(k){if(!e.cel[k])e.cel[k]={perguntas:[],docs:[],como:''};if((!e.cel[k].perguntas||!e.cel[k].perguntas.length)&&e.ind[k]&&e.ind[k].length)e.cel[k].perguntas=e.ind[k].slice();});
 (e.normas||[]).forEach(function(n){(n.itens||[]).forEach(function(it){if(!it.pool)it.pool=[];if(!it.docs)it.docs=[];});});});}
function norm2(s){return String(s==null?'':s).toLowerCase().replace(/\s+/g,' ').trim();}
function mapaProcData(nome){try{var r=localStorage.getItem(MAPA_LS);if(!r)return null;var s=JSON.parse(r);var alvo=norm2(nome);var p=(s.processos||[]).find(function(x){return norm2(x.nome)===alvo;});if(!p)return null;return {nome:p.nome,codigo:p.codigo||'',missao:p.missao||'',ip:p.ip||{},mcr:p.mcr||[]};}catch(e){return null;}}
function reqInScope(e,procId){return reqList(e).filter(function(r){var key=r.norma+'|'+r.codigo+'||'+procId;return (e.grade&&e.grade[key])!=='NA';});}
function celData(){var e=E();e.cel=e.cel||{};e.cel[celKey]=e.cel[celKey]||{perguntas:[],docs:[],como:''};return e.cel[celKey];}
/* ── Escopos ── */
function addEscopo(){var emp=prompt('Nome da empresa:');if(!emp)return;var nm=prompt('Nome do escopo (ex.: Serviço de galvanização):','')||'Escopo';var e={id:uid('e'),empresa:emp.trim(),nome:nm.trim(),rev:'01',data:'',normas:[],processos:[],grade:{},ind:{},historico:[]};state.escopos.push(e);ativo=e.id;normaSel=null;aba='normas';salvar();render();}
function removeEscopo(id){if(state.escopos.length<=1){alert('Deixe ao menos um escopo.');return;}var e=state.escopos.find(function(x){return x.id===id;});if(!confirm('Remover o escopo "'+e.empresa+'"?'))return;state.escopos=state.escopos.filter(function(x){return x.id!==id;});if(ativo===id)ativo=state.escopos[0].id;salvar();render();}
/* ── Render ── */
function render(){renderList();renderMain();}
function renderList(){var el=document.getElementById('plist');el.innerHTML='';state.escopos.forEach(function(e){var d=document.createElement('div');d.className='pcard'+(e.id===ativo?' on':'');d.innerHTML='<div class="cod">'+esc(e.empresa)+'</div><div class="nm">'+esc(e.nome)+'</div><div class="meta"><span>'+(e.normas?e.normas.length:0)+' normas</span><span>'+reqCount(e)+' requisitos</span><span>'+(e.processos?e.processos.length:0)+' processos</span></div>';d.onclick=function(){ativo=e.id;normaSel=(e.normas[0]?e.normas[0].id:null);render();};el.appendChild(d);});}
function renderMain(){var e=E();if(!e){document.getElementById('main').innerHTML='';return;}
 var procs=e.processos||[];var comIP=procs.filter(function(p){return statusProc(p.nome).temIP;}).length;var comMCR=procs.filter(function(p){return statusProc(p.nome).temMCR;}).length;
 var h='<div class="phead"><div class="row1"><span class="badge">ESCOPO</span><h3 contenteditable="true" id="enome">'+esc(e.nome)+'</h3><div class="sp"></div><button class="btn gh sm" onclick="removeEscopo(\''+e.id+'\')" title="Remover">🗑</button></div>'+
  '<div class="metaline"><span><b>Empresa:</b> <span contenteditable="true" data-f="empresa">'+esc(e.empresa)+'</span></span><span><b>Rev.:</b> <span contenteditable="true" data-f="rev">'+esc(e.rev||'01')+'</span></span><span><b>Data:</b> <span contenteditable="true" data-f="data">'+esc(e.data||'—')+'</span></span></div>'+
  '<div class="tabs"><button class="tab '+(aba==='normas'?'on':'')+'" data-ab="normas">Normas &amp; requisitos</button><button class="tab '+(aba==='processos'?'on':'')+'" data-ab="processos">Processos (setores)</button><button class="tab '+(aba==='resumo'?'on':'')+'" data-ab="resumo">Resumo</button><button class="tab '+(aba==='revisao'?'on':'')+'" data-ab="revisao">Revisão &amp; histórico</button></div></div>';
 // KPIs
 h+='<div class="kpis"><div class="kpi"><div class="n">'+(e.normas?e.normas.length:0)+'</div><div class="l">Normas</div></div>'+
   '<div class="kpi ok"><div class="n">'+reqCount(e)+'</div><div class="l">Requisitos (itens)</div></div>'+
   '<div class="kpi"><div class="n">'+procs.length+'</div><div class="l">Processos / setores</div></div>'+
   '<div class="kpi med"><div class="n">'+comIP+'<span style="font-size:13px;color:var(--mut)"> / '+procs.length+'</span></div><div class="l">Com IP</div></div>'+
   '<div class="kpi med"><div class="n">'+comMCR+'<span style="font-size:13px;color:var(--mut)"> / '+procs.length+'</span></div><div class="l">Com MCR</div></div>'+
   '<div class="kpi"><div class="n">'+esc(e.rev||'01')+'</div><div class="l">Revisão</div></div></div>';
 h+=renderNormas(e)+renderProcessos(e)+renderResumo(e)+renderRevisao(e);
 document.getElementById('main').innerHTML=h;bind();
}
/* ── Normas ── */
function renderNormas(e){
 var nlist=(e.normas||[]).map(function(n){var sel=(n.itens||[]).filter(function(i){return i.sel;}).length;return '<div class="nitem'+(n.id===normaSel?' on':'')+'" data-nsel="'+n.id+'"><span class="nm">'+esc(n.nome)+'</span><span class="ct">'+sel+'/'+(n.itens?n.itens.length:0)+'</span><span class="x" data-nrm="'+n.id+'">✕</span></div>';}).join('')||'<div class="empty">Sem normas ainda.</div>';
 var norma=(e.normas||[]).find(function(n){return n.id===normaSel;});
 var items='';
 if(norma){items=(norma.itens||[]).map(function(it,i){return '<div class="irow'+(it.sel?' sel':'')+'" data-tog="'+i+'"><span class="ck"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></span><span class="cd">'+esc(it.codigo)+'</span><span class="ti">'+esc(it.titulo)+'</span><span class="x" data-irm="'+i+'" style="opacity:.4;cursor:pointer;color:var(--mut)">✕</span></div>';}).join('')||'<div class="empty">Sem itens. Adicione abaixo.</div>';}
 else items='<div class="empty">Selecione uma norma à esquerda.</div>';
 return '<div class="panel '+(aba==='normas'?'on':'')+'"><div class="cols">'+
  '<div class="box"><h4>Normas <button class="btn sm" onclick="addNorma()" style="padding:3px 8px">＋</button></h4><div class="nlist">'+nlist+'</div></div>'+
  '<div class="box"><h4>'+(norma?('Itens de '+esc(norma.nome)+' — marcados viram requisitos'):'Itens')+'</h4><div class="items">'+items+'</div>'+(norma?'<div class="additem"><input id="itcod" placeholder="Código (ex.: 8.5)"><input id="ittit" placeholder="Título do item"><button class="btn sm pri" onclick="addItem()">Adicionar</button></div>':'')+'</div>'+
  '</div></div>';
}
function addNorma(){
 var nomes=Object.keys(NORMA_BASE);
 var msg='Escolha uma norma base ou digite um nome novo:\n';nomes.forEach(function(n,i){msg+=(i+1)+' = '+n+'\n';});msg+='(ou digite o nome de uma norma personalizada)';
 var v=prompt(msg,'1');if(v==null)return;v=v.trim();if(!v)return;
 var e=E();var nova;var idx=parseInt(v,10);
 if(!isNaN(idx)&&idx>=1&&idx<=nomes.length)nova=normaFromBase(nomes[idx-1]);
 else nova={id:uid('n'),nome:v,itens:[]};
 if((e.normas||[]).some(function(n){return n.nome.toLowerCase()===nova.nome.toLowerCase();})){alert('Essa norma já está no escopo.');return;}
 e.normas=e.normas||[];e.normas.push(nova);normaSel=nova.id;logHist('Norma "'+nova.nome+'" adicionada ao escopo',true);render();
}
function addItem(){var norma=(E().normas||[]).find(function(n){return n.id===normaSel;});if(!norma)return;var cod=(document.getElementById('itcod').value||'').trim();var tit=(document.getElementById('ittit').value||'').trim();if(!cod&&!tit)return;norma.itens=norma.itens||[];norma.itens.push({codigo:cod,titulo:tit,sel:true,pool:[],docs:[]});logHist('Requisito '+cod+' incluído em '+norma.nome,true);render();}
/* ── Processos ── */
function renderProcessos(e){
 var rows=(e.processos||[]).map(function(p,i){var s=statusProc(p.nome);return '<tr><td><span class="setor">SETOR</span> <span contenteditable="true" data-pn="'+i+'">'+esc(p.nome)+'</span></td>'+
   '<td><span class="tag '+(s.temIP?'on':'off')+'">'+(s.temIP?'IP definido':'IP pendente')+'</span></td>'+
   '<td><span class="tag '+(s.temMCR?'on':'off')+'">'+(s.temMCR?'MCR definida':'MCR pendente')+'</span></td>'+
   '<td style="text-align:right;white-space:nowrap"><button class="btn gh sm" data-gerar="'+i+'" title="Gerar perguntas deste processo com IA" style="color:var(--petrol)">✨ Gerar</button> <span class="btn gh sm" data-prm="'+i+'" style="color:var(--mut)">✕</span></td></tr>';}).join('')||'<tr><td colspan="4" class="empty">Sem processos. Adicione ou importe do Mapa de Processos.</td></tr>';
 return '<div class="panel '+(aba==='processos'?'on':'')+'">'+
  '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin:2px 0 12px;flex-wrap:wrap"><div style="font-family:var(--disp);font-weight:600;color:var(--mid)">Processos do escopo — cada processo é um setor da auditoria</div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn sm" onclick="gerarTodos()">✨ Gerar perguntas (todos)</button><button class="btn sm" onclick="importarDoMapa()">↧ Importar do Mapa</button><button class="btn pri sm" onclick="addProc()">＋ Processo</button></div></div>'+
  '<div class="box"><table><thead><tr><th>Processo (setor)</th><th>Interação de Processo</th><th>Matriz de Risco</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>'+
  '<p class="note">O botão <b>✨ Gerar</b> usa a IA para criar as perguntas + documentos + como verificar de cada requisito deste processo, a partir do IP e da MCR dele (lidos do Mapa de Processos). As perguntas ficam editáveis nas células da grade (aba Resumo).</p></div>';
}
function addProc(){var nm=prompt('Nome do processo (setor):');if(!nm)return;var e=E();e.processos=e.processos||[];e.processos.push({id:uid('p'),nome:nm.trim()});salvar();render();}
function importarDoMapa(){var e=E();var list=mapaProcs();if(!list.length){alert('Não encontrei processos no Mapa de Processos. Abra o módulo Mapa de Processos e cadastre-os primeiro.');return;}var existentes=(e.processos||[]).map(function(p){return (p.nome||'').trim().toLowerCase();});var add=0;list.forEach(function(p){if(existentes.indexOf((p.nome||'').trim().toLowerCase())<0){e.processos.push({id:uid('p'),nome:p.nome});add++;}});salvar();render();flash(add?('Importados '+add+' processo(s) ✓'):'Nenhum processo novo para importar');}
function removeProc(i){var e=E();if(!confirm('Remover este processo do escopo?'))return;e.processos.splice(i,1);salvar();render();}
function gerarPerguntasProcesso(i,silent,cb){
 var e=E();var p=e.processos[i];if(!p){if(cb)cb();return;}
 var pd=mapaProcData(p.nome);
 if(!pd){if(!silent)alert('Cadastre o IP e a MCR de "'+p.nome+'" no Mapa de Processos antes de gerar (o nome precisa bater).');if(cb)cb();return;}
 var reqs=reqInScope(e,p.id);
 if(!reqs.length){if(!silent)alert('Marque os requisitos (itens de norma) aplicáveis antes de gerar.');if(cb)cb();return;}
 e.cel=e.cel||{};
 if(!silent){var jaTem=reqs.some(function(r){var k=r.norma+'|'+r.codigo+'||'+p.id;return e.cel[k]&&e.cel[k].perguntas&&e.cel[k].perguntas.length;});if(jaTem&&!confirm('Já existem perguntas para "'+p.nome+'". Gerar de novo vai substituí-las. Continuar?')){if(cb)cb();return;}}
 flash('Gerando perguntas de "'+p.nome+'"…');
 fetch('/api/gerar-perguntas',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({processo:{nome:p.nome,codigo:pd.codigo,missao:pd.missao,ip:pd.ip,mcr:pd.mcr},requisitos:reqs.map(function(r){return {norma:r.norma,codigo:r.codigo,titulo:r.titulo};})})})
  .then(function(r){return r.json();})
  .then(function(res){
    if(!res||!res.ok)throw new Error((res&&res.error)||'falha na IA');
    var arr=res.requisitos||[];var n=0;
    arr.forEach(function(rq){var match=reqs.find(function(r){return String(r.codigo)===String(rq.codigo)&&(!rq.norma||norm2(r.norma)===norm2(rq.norma));})||reqs.find(function(r){return String(r.codigo)===String(rq.codigo);});if(!match)return;var k=match.norma+'|'+match.codigo+'||'+p.id;e.cel[k]={perguntas:(rq.perguntas||[]).map(String),docs:(rq.documentos||[]).map(String),como:String(rq.comoVerificar||'')};n++;});
    logHist('Perguntas geradas por IA para "'+p.nome+'" ('+n+' requisitos)',false);
    salvar();renderMain();flash('“'+p.nome+'”: '+n+' requisitos gerados ✓');
    if(cb)cb();
  })
  .catch(function(err){flash('');if(!silent)alert('Não consegui gerar para "'+p.nome+'": '+(err.message||err)+'\n\nVerifique o GEMINI_API_KEY no servidor.');if(cb)cb(err);});
}
function gerarTodos(){var e=E();var procs=e.processos||[];if(!procs.length)return;if(!confirm('Gerar perguntas para os '+procs.length+' processos? Vai substituir o que já existir. (Roda um por vez, pode levar um tempo.)'))return;var i=0;function next(){if(i>=procs.length){flash('Geração em lote concluída ✓');return;}gerarPerguntasProcesso(i,true,function(){i++;setTimeout(next,700);});}next();}
/* ── Resumo ── */
function renderResumo(e){
 var reqs=reqList(e);var procs=e.processos||[];
 var lista=reqs.map(function(r){return '<div class="req"><b>'+esc(r.codigo)+'</b><span>'+esc(r.titulo)+' <span style="color:var(--mut)">· '+esc(r.norma)+'</span></span></div>';}).join('')||'<div class="empty">Nenhum requisito marcado ainda.</div>';
 var grade='';
 if(reqs.length&&procs.length){
  var head='<tr><th class="req">Requisito</th>'+procs.map(function(p){return '<th>'+esc(p.nome)+'</th>';}).join('')+'</tr>';
  var body=reqs.map(function(r){var rk=r.norma+'|'+r.codigo;return '<tr><td class="rq" title="'+esc(r.titulo)+'">'+esc(r.codigo)+'</td>'+procs.map(function(p){var key=rk+'||'+p.id;var val=(e.grade&&e.grade[key])||'X';var cls=val==='NA'?'cellna':'cellx';var cd=e.cel&&e.cel[key];var tem=cd&&((cd.perguntas&&cd.perguntas.length)||(cd.docs&&cd.docs.length)||(cd.como&&cd.como.trim()));var dot=(val==='X'&&tem)?'<span class="qd"></span>':'';return '<td class="'+cls+'" data-cell="'+esc(key)+'" title="Clique: aplicabilidade, perguntas, documentos e como verificar">'+val+dot+'</td>';}).join('')+'</tr>';}).join('');
  grade='<div class="gridwrap"><table class="grid"><thead>'+head+'</thead><tbody>'+body+'</tbody></table></div><p class="note">Clique numa célula para definir a <b>aplicabilidade</b> (X ↔ NA) e ver/editar as <b>perguntas</b>, os <b>documentos</b> e o <b>como verificar</b> gerados. O ponto turquesa indica que a célula já tem conteúdo. Gere as perguntas em massa na aba <b>Processos</b> (botão ✨).</p>';
 } else grade='<div class="empty">Marque requisitos e cadastre processos para ver a grade.</div>';
 return '<div class="panel '+(aba==='resumo'?'on':'')+'">'+
  '<div style="font-family:var(--disp);font-weight:600;color:var(--mid);margin-bottom:4px">O que o Escopo entrega ao Programa de Auditoria</div>'+
  '<p class="note" style="margin-bottom:14px">Saída do Escopo → entrada do Programa: <b>'+reqs.length+'</b> requisitos × <b>'+procs.length+'</b> processos.</p>'+
  '<div class="rescols"><div class="box" style="padding:12px"><h4 style="border:none;padding:0 0 8px">Requisitos ('+reqs.length+')</h4><div class="reqlist">'+lista+'</div></div>'+
  '<div class="box" style="padding:12px"><h4 style="border:none;padding:0 0 8px">Grade requisito × processo</h4>'+grade+'</div></div></div>';
}
/* ── Revisão & histórico (item 4) ── */
function renderRevisao(e){
 var hist=(e.historico||[]).slice(0,300);
 var rows=hist.map(function(h){return '<tr><td><span class="revtag">REV '+esc(h.rev)+'</span></td><td style="white-space:nowrap">'+esc(h.quando||'')+'</td><td>'+esc(h.acao)+'</td><td>'+(h.revisou?'<span class="tag rev">gera revisão</span>':'<span class="tag off">histórico</span>')+'</td></tr>';}).join('')||'<tr><td colspan="4" class="empty">Sem alterações registradas ainda.</td></tr>';
 return '<div class="panel '+(aba==='revisao'?'on':'')+'">'+
  '<div style="display:flex;align-items:center;gap:16px;margin-bottom:14px;flex-wrap:wrap"><div style="font-family:var(--disp);font-weight:700;font-size:30px;color:var(--mid);line-height:1">REV '+esc(e.rev||'01')+'</div>'+
   '<div class="note" style="margin:0;flex:1;min-width:240px">Incluir, excluir ou alterar um requisito, e marcar/desmarcar a aplicabilidade (X ↔ NA), <b>geram nova revisão</b>. Editar perguntas ou documentos fica <b>só no histórico</b>. Cada auditoria congela a revisão vigente na sua data.</div></div>'+
  '<div class="box"><table><thead><tr><th style="width:82px">Revisão</th><th style="width:150px">Quando</th><th>Alteração</th><th style="width:130px">Efeito</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}
/* ── Painel da célula: aplicabilidade + perguntas + documentos (item 3) ── */
var celKey=null;
function arrOf(tipo){var c=celData();if(tipo==='docs'){c.docs=c.docs||[];return c.docs;}c.perguntas=c.perguntas||[];return c.perguntas;}
function openCelula(k){celKey=k;var e=E();var c=parseCel(k);var it=findItem(e,c.norma,c.codigo);if(!it){return;}var cel=celData();
 var estado=(e.grade&&e.grade[k])||'X';
 function lst(arr,tipo,vazio){return (arr.length?arr.map(function(v,i){return '<div class="ln"><span class="lt" contenteditable="true" data-le="'+tipo+'" data-i="'+i+'">'+esc(v)+'</span><span class="lx" data-lrm="'+tipo+'|'+i+'">✕</span></div>';}).join(''):'<div class="lnempty">'+vazio+'</div>');}
 var body=(estado==='X'?(
   '<div style="margin:2px 0 14px"><button class="btn sm pri" onclick="gerarCel()">✨ Gerar/atualizar com IA</button></div>'+
   '<div class="dsec"><div class="st2">Perguntas <small>· deste processo</small></div><div class="lns">'+lst(cel.perguntas||[],'perguntas','Nenhuma pergunta ainda. Gere com IA ou adicione.')+'</div><span class="addln" data-ladd="perguntas">＋ pergunta</span></div>'+
   '<div class="dsec"><div class="st2">Documentos sugeridos</div><div class="lns">'+lst(cel.docs||[],'docs','Nenhum documento ainda.')+'</div><span class="addln" data-ladd="docs">＋ documento</span></div>'+
   '<div class="dsec"><div class="st2">Como verificar</div><textarea id="celcomo" rows="3" placeholder="Como o auditor busca a evidência…" style="width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-family:inherit;font-size:13px;color:var(--ink);resize:vertical;outline:none">'+esc(cel.como||'')+'</textarea></div>'
  ):'<div class="note" style="padding:6px 0 0">Marque como <b>aplicável (X)</b> para definir as perguntas e os documentos deste requisito neste processo.</div>');
 var dr=document.getElementById('drawer');
 dr.innerHTML='<div class="dhead"><div class="dt"><div class="dsub">'+esc(c.codigo)+' &nbsp;·&nbsp; '+esc(procNomeById(e,c.proc))+'</div><h3>'+esc(it.titulo||'Requisito')+'</h3></div><span class="dclose" onclick="closeCelula()">✕</span></div>'+
  '<div class="dbody"><div class="dsec"><div class="st2">Aplicabilidade</div><div class="toggle2"><button class="tg'+(estado==='X'?' on':'')+'" onclick="setCel(\'X\')">X — aplicável</button><button class="tg'+(estado==='NA'?' onna':'')+'" onclick="setCel(\'NA\')">NA — não aplicável</button></div></div>'+body+'</div>';
 document.getElementById('scrim').classList.add('on');dr.classList.add('on');bindCelula();
}
function gerarCel(){var e=E();var c=parseCel(celKey);var p=(e.processos||[]).find(function(x){return x.id===c.proc;});if(!p)return;var pd=mapaProcData(p.nome);if(!pd){alert('Cadastre o IP/MCR de "'+p.nome+'" no Mapa de Processos primeiro.');return;}var it=findItem(e,c.norma,c.codigo);flash('Gerando com IA…');
 fetch('/api/gerar-perguntas',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({processo:{nome:p.nome,codigo:pd.codigo,missao:pd.missao,ip:pd.ip,mcr:pd.mcr},requisitos:[{norma:c.norma,codigo:c.codigo,titulo:it?it.titulo:''}]})})
  .then(function(r){return r.json();}).then(function(res){if(!res||!res.ok)throw new Error((res&&res.error)||'falha na IA');var rq=(res.requisitos||[])[0];if(!rq){flash('');alert('A IA não retornou nada para este requisito.');return;}e.cel=e.cel||{};e.cel[celKey]={perguntas:(rq.perguntas||[]).map(String),docs:(rq.documentos||[]).map(String),como:String(rq.comoVerificar||'')};logHist('Perguntas geradas por IA em '+c.codigo,false);salvar();openCelula(celKey);flash('Gerado ✓');})
  .catch(function(err){flash('');alert('Não consegui gerar: '+(err.message||err)+'\n\nVerifique o GEMINI_API_KEY no servidor.');});
}
function setCel(v){var e=E();e.grade=e.grade||{};var cur=(e.grade[celKey]||'X');if(cur!==v){e.grade[celKey]=v;var c=parseCel(celKey);logHist('Aplicabilidade '+c.codigo+' × '+procNomeById(e,c.proc)+' → '+v,true);}openCelula(celKey);renderList();}
function bindCelula(){
 document.querySelectorAll('#drawer [data-le]').forEach(function(el){el.addEventListener('blur',function(){var arr=arrOf(this.getAttribute('data-le'));arr[+this.getAttribute('data-i')]=this.textContent.trim();logHist('Editou item de '+parseCel(celKey).codigo+' (perguntas/documentos)',false);});});
 document.querySelectorAll('#drawer [data-lrm]').forEach(function(el){el.onclick=function(){var s=this.getAttribute('data-lrm').split('|');arrOf(s[0]).splice(+s[1],1);logHist('Removeu '+s[0]+' de '+parseCel(celKey).codigo,false);openCelula(celKey);};});
 document.querySelectorAll('#drawer [data-ladd]').forEach(function(el){el.onclick=function(){var t=this.getAttribute('data-ladd');var v=prompt(t==='docs'?'Documento sugerido:':'Texto da pergunta:');if(!v)return;arrOf(t).push(v.trim());logHist('Adicionou '+(t==='docs'?'documento':'pergunta')+' em '+parseCel(celKey).codigo,false);openCelula(celKey);};});
 var como=document.getElementById('celcomo');if(como)como.addEventListener('blur',function(){celData().como=this.value.trim();logHist('Editou "como verificar" de '+parseCel(celKey).codigo,false);});
}
function closeCelula(){celKey=null;var s=document.getElementById('scrim');if(s)s.classList.remove('on');var d=document.getElementById('drawer');if(d)d.classList.remove('on');renderMain();}
document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeCelula();});

function bind(){var e=E();
 document.querySelectorAll('.tab').forEach(function(b){b.onclick=function(){aba=this.getAttribute('data-ab');renderMain();};});
 var en=document.getElementById('enome');if(en)en.addEventListener('blur',function(){e.nome=this.textContent.trim()||e.nome;salvar();renderList();});
 document.querySelectorAll('.metaline [data-f]').forEach(function(el){el.addEventListener('blur',function(){var f=this.getAttribute('data-f');var v=this.textContent.trim();e[f]=(v==='—')?'':v;salvar();if(f==='empresa')renderList();});});
 document.querySelectorAll('[data-nsel]').forEach(function(el){el.onclick=function(ev){if(ev.target.getAttribute('data-nrm'))return;normaSel=this.getAttribute('data-nsel');renderMain();};});
 document.querySelectorAll('[data-nrm]').forEach(function(el){el.onclick=function(ev){ev.stopPropagation();var id=this.getAttribute('data-nrm');var nrm=e.normas.find(function(n){return n.id===id;});if(!confirm('Remover esta norma do escopo?'))return;e.normas=e.normas.filter(function(n){return n.id!==id;});if(normaSel===id)normaSel=e.normas[0]?e.normas[0].id:null;logHist('Norma "'+(nrm?nrm.nome:'')+'" removida do escopo',true);render();};});
 document.querySelectorAll('[data-tog]').forEach(function(el){el.onclick=function(ev){if(ev.target.getAttribute('data-irm'))return;var norma=e.normas.find(function(n){return n.id===normaSel;});if(!norma)return;var it=norma.itens[+this.getAttribute('data-tog')];it.sel=!it.sel;logHist('Requisito '+it.codigo+(it.sel?' incluído no':' removido do')+' programa',true);renderMain();renderList();};});
 document.querySelectorAll('[data-irm]').forEach(function(el){el.onclick=function(ev){ev.stopPropagation();var norma=e.normas.find(function(n){return n.id===normaSel;});if(!norma)return;var it=norma.itens[+this.getAttribute('data-irm')];norma.itens.splice(+this.getAttribute('data-irm'),1);logHist('Requisito '+((it&&it.codigo)||'')+' excluído de '+norma.nome,true);renderMain();renderList();};});
 document.querySelectorAll('[data-pn]').forEach(function(el){el.addEventListener('blur',function(){e.processos[+this.getAttribute('data-pn')].nome=this.textContent.trim();salvar();renderMain();renderList();});});
 document.querySelectorAll('[data-prm]').forEach(function(el){el.onclick=function(){removeProc(+this.getAttribute('data-prm'));};});
 document.querySelectorAll('[data-gerar]').forEach(function(el){el.onclick=function(){gerarPerguntasProcesso(+this.getAttribute('data-gerar'));};});
 document.querySelectorAll('[data-cell]').forEach(function(el){el.onclick=function(){openCelula(this.getAttribute('data-cell'));};});
}
try{if(window.self!==window.top)document.body.classList.add('embedded');}catch(e){document.body.classList.add('embedded');}
carregar();render();
