<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Processos · IP e MCR — METIS</title>
<link rel="icon" href="/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root{
    --petrol:#2C6E8E;--petrol-d:#245F7C;--mid:#2B3F5C;--turq:#1FA59E;--turq-d:#0e6f69;
    --ink:#22303f;--slate:#5b6b7e;--mut:#8698a8;--line:#e5ebf1;--bg:#eef2f6;--card:#fff;
    --lo:#1FA59E;--lo-bg:#e4f4f1;--med:#c8781c;--med-bg:#faefdd;--hi:#c0392b;--hi-bg:#fbe9e6;
    --disp:'Space Grotesk','Segoe UI',system-ui,sans-serif;--body:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--body);color:var(--ink);background:radial-gradient(1100px 520px at 80% -10%, rgba(31,165,158,.08), transparent 60%),var(--bg)}
  .top{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:11px 22px}
  .logo{display:flex;align-items:center;gap:10px}.logo img{width:30px;height:30px}
  .logo b{font-family:var(--disp);font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);font-size:16px}
  .logo small{display:block;font-size:10px;color:var(--mut);letter-spacing:.08em;margin-top:1px}
  .top h1{font-family:var(--disp);font-weight:600;font-size:15px;color:var(--mid);margin-left:6px}
  .sp{flex:1}.st{font-size:12px;color:var(--turq-d);min-width:52px}
  .btn{font-family:var(--body);font-size:13px;font-weight:600;cursor:pointer;padding:8px 14px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--ink);display:inline-flex;align-items:center;gap:7px;transition:.15s}
  .btn:hover{border-color:#9fb2c2;box-shadow:0 8px 20px -12px rgba(34,48,63,.45)}
  .btn.pri{background:var(--petrol);border-color:var(--petrol);color:#fff}.btn.pri:hover{background:var(--petrol-d)}
  .btn.gh{border-color:transparent;background:transparent;padding:5px 8px}.btn.sm{padding:5px 9px;font-size:12px}
  .wrap{max-width:1500px;margin:0 auto;padding:20px 22px 70px}
  .aside{align-self:start;position:sticky;top:76px}
  .aside h2{font-family:var(--disp);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin:2px 4px 10px}
  .plist{display:flex;flex-direction:column;gap:8px}
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
  .pcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:transparent}
  .pcard:hover{border-color:#c6d4e0;transform:translateY(-1px)}.pcard.on{border-color:var(--petrol)}.pcard.on::before{background:var(--turq)}
  .pcard .cod{font-family:var(--disp);font-weight:600;font-size:11px;color:var(--petrol);letter-spacing:.06em}
  .pcard .nm{font-weight:600;font-size:14px;color:var(--mid);margin-top:2px}
  .pcard .meta{font-size:11px;color:var(--mut);margin-top:6px;display:flex;gap:8px}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:1px}
  .addp{width:100%;border:1.5px dashed #c2d0dd;background:transparent;color:var(--slate);border-radius:14px;padding:12px;cursor:pointer;font-weight:600;font-size:13px}
  .addp:hover{border-color:var(--petrol);color:var(--petrol)}
  .main{min-width:0}
  .phead{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:16px;box-shadow:0 1px 2px rgba(34,48,63,.04)}
  .phead .row1{display:flex;align-items:center;gap:12px}
  .badge{font-family:var(--disp);font-weight:600;background:var(--mid);color:#fff;border-radius:10px;padding:5px 11px;font-size:13px;letter-spacing:.04em}
  .phead h3{font-family:var(--disp);font-size:20px;color:var(--mid);outline:none}
  .tabs{display:flex;gap:4px;margin:16px 0 4px;background:#e9eef4;padding:4px;border-radius:12px;width:fit-content}
  .tab{font-family:var(--disp);font-weight:600;font-size:13.5px;padding:8px 16px;border:none;background:none;color:var(--slate);border-radius:9px;cursor:pointer;transition:.15s}
  .tab.on{background:#fff;color:var(--petrol);box-shadow:0 2px 8px -4px rgba(34,48,63,.3)}
  .panel{display:none}.panel.on{display:block;animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  /* ── DIAGRAMA DE TARTARUGA (caixas) ── */
  .ipwrap{position:relative;margin-top:18px}
  .ipwrap::before{content:'';position:absolute;inset:-8px;background:radial-gradient(480px 320px at 50% 48%, rgba(31,165,158,.08), transparent 72%);pointer-events:none;z-index:0}
  .ip{position:relative;z-index:1;display:grid;grid-template-columns:1fr 1fr 1.45fr 1fr 1fr;gap:42px 48px;align-items:stretch}
  .wires{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:3;overflow:visible}
  .wires .flow{animation:dashmove 1s linear infinite;opacity:.9}
  @keyframes dashmove{to{stroke-dashoffset:-18}}
  .zbox{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 14px;position:relative;overflow:hidden}
  .zbox::before{content:'';position:absolute;left:0;right:0;top:0;height:4px;background:var(--petrol)}
  .zbox.io::before{background:var(--turq)}.zbox.sup::before{background:var(--mid)}
  .zbox h4{font-family:var(--disp);font-size:12px;letter-spacing:.04em;color:var(--mid);margin-bottom:8px;text-transform:uppercase}
  .lst{display:flex;flex-direction:column;gap:4px}
  .li{display:flex;gap:6px;align-items:flex-start;font-size:12px;color:var(--ink)}
  .li .b{color:var(--turq);font-weight:700;line-height:1.3}
  .li .txt{flex:1;outline:none;border-radius:5px;padding:1px 4px;line-height:1.35}.li .txt:focus{background:#f2f7fb}
  .li .x{opacity:0;color:var(--mut);cursor:pointer;font-size:11px;padding:0 2px}.li:hover .x{opacity:.7}.li .x:hover{color:var(--hi)}
  .addli{font-size:11.5px;color:var(--petrol);font-weight:600;cursor:pointer;margin-top:5px;display:inline-block}
  .z-rec{grid-column:1/3;grid-row:1}.z-dono{grid-column:3;grid-row:1}.z-mo{grid-column:4/6;grid-row:1}
  .z-ori{grid-column:1;grid-row:2}.z-ent{grid-column:2;grid-row:2}.z-proc{grid-column:3;grid-row:2}.z-sai{grid-column:4;grid-row:2}.z-des{grid-column:5;grid-row:2}
  .z-met{grid-column:1/3;grid-row:3}.z-mis{grid-column:3;grid-row:3}.z-med{grid-column:4/6;grid-row:3}
  .z-dono::before,.z-mis::before{background:var(--mid)}
  /* Processo (centro) */
  .proc{background:linear-gradient(165deg,#f0fbf9,#dff2ee);border:1.6px solid #93d4ca;box-shadow:0 0 0 5px rgba(31,165,158,.10),0 24px 54px -26px rgba(31,165,158,.65)}
  .proc::before{background:linear-gradient(90deg,var(--turq),var(--petrol))}
  .proc h4{color:var(--petrol-d);text-align:center}
  .proc .core-lbl{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:6px}
  .proc .core-lbl svg{width:26px;height:26px}
  .abadge{position:absolute;background:var(--petrol);color:#fff;font-family:var(--disp);font-weight:700;font-size:11px;width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;z-index:4;box-shadow:0 2px 6px rgba(0,0,0,.2)}
  .abadge.e{left:-11px;top:50%;transform:translateY(-50%)}
  .abadge.s{right:-11px;top:50%;transform:translateY(-50%);background:var(--turq)}
  .abadge.g{top:-11px;left:50%;transform:translateX(-50%);background:var(--mid)}
  .abadge.m{bottom:-11px;left:50%;transform:translateX(-50%);background:var(--mid)}
  .risco{position:absolute;font-size:8.5px;color:var(--mut);font-weight:700;letter-spacing:.04em}
  .risco.re{left:-8px;top:calc(50% - 20px)}.risco.rs{right:-8px;top:calc(50% - 20px)}
  .zbox.mis .mtxt{font-size:12px;color:var(--mid);outline:none;line-height:1.4;border-radius:6px;padding:2px 4px}.zbox.mis .mtxt:focus{background:#f2f7fb}
  .iplegend{grid-column:1/6;grid-row:4;display:flex;gap:18px;flex-wrap:wrap;justify-content:center;color:var(--slate);font-size:11px;margin-top:2px}
  .iplegend b{font-family:var(--disp);color:var(--petrol)}
  /* MCR */
  .mcr-top{display:flex;flex-wrap:wrap;gap:16px;margin-top:14px;align-items:flex-start}
  .mcr-table{flex:1;min-width:520px;background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  table{border-collapse:collapse;width:100%;font-size:12.5px}
  th{background:#f6f9fb;text-align:left;padding:10px;color:var(--mid);font-family:var(--disp);font-weight:600;font-size:11px;letter-spacing:.03em;border-bottom:1px solid var(--line)}
  td{padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  td [contenteditable]{outline:none;border-radius:5px;padding:2px 4px;display:block;min-height:18px}td [contenteditable]:focus{background:#f2f7fb}
  select{border:1px solid var(--line);border-radius:7px;padding:4px 6px;font-family:inherit;font-size:12px;background:#fff}
  .ro{display:inline-block;font-weight:700;font-size:11px;border-radius:6px;padding:2px 7px}.ro.R{background:var(--med-bg);color:var(--med)}.ro.O{background:var(--lo-bg);color:var(--turq-d)}
  .cls{font-family:var(--disp);font-weight:700;text-align:center;border-radius:8px;padding:3px 0;color:#fff;font-size:13px}
  .heat{width:300px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
  .heat h4{font-family:var(--disp);font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--mid);margin-bottom:12px}
  .hgrid{display:grid;grid-template-columns:44px repeat(3,1fr);grid-auto-rows:52px;gap:5px;align-items:center}
  .hh{font-size:10.5px;color:var(--mut);text-align:center;font-weight:600}
  .cell{border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-family:var(--disp);font-weight:700}.cell small{font-size:10px;font-weight:500;opacity:.85}
  .leg{display:flex;gap:12px;margin-top:12px;font-size:11.5px;color:var(--slate);flex-wrap:wrap}.leg b{display:inline-flex;align-items:center;gap:5px}
  .sw{width:14px;height:14px;border-radius:4px;display:inline-block}
  /* ── MCR · ciclo de risco ── */
  .mcrmeta{display:flex;flex-wrap:wrap;gap:6px 22px;margin:2px 0 14px;font-size:12px;color:var(--slate)}
  .mcrmeta b{color:var(--mid);font-family:var(--disp);font-weight:600}
  .mcrmeta [contenteditable]{outline:none;border-bottom:1px dashed transparent;padding:0 2px;min-width:36px;display:inline-block}
  .mcrmeta [contenteditable]:hover{border-bottom-color:#cdd8e2}.mcrmeta [contenteditable]:focus{border-bottom-color:var(--petrol);background:#f2f7fb}
  .mcr-kpis{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 14px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 14px;min-width:112px;flex:1;position:relative;overflow:hidden}
  .kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--petrol)}
  .kpi.hi::before{background:var(--hi)}.kpi.ok::before{background:var(--turq)}.kpi.med::before{background:var(--med)}
  .kpi .n{font-family:var(--disp);font-weight:700;font-size:23px;color:var(--mid);line-height:1}
  .kpi .n small{font-size:12px;font-weight:600;color:var(--mut)}
  .kpi .l{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin-top:6px;font-weight:600}
  .bna{display:inline-flex;align-items:center;gap:7px}
  .chip{font-family:var(--disp);font-weight:700;font-size:12.5px;color:#fff;border-radius:7px;min-width:26px;text-align:center;padding:3px 8px;display:inline-block}
  .chip.gh2{background:transparent;color:var(--mut);border:1px dashed #cdd8e2;font-weight:600}
  .bna .arw{color:var(--mut);font-size:13px}
  .status{font-size:10.5px;font-weight:700;border-radius:20px;padding:3px 10px;display:inline-block;letter-spacing:.02em;white-space:nowrap}
  .status.none{background:#eef2f6;color:var(--mut)}.status.plan{background:var(--med-bg);color:var(--med)}
  .status.done{background:#e7eef6;color:var(--petrol)}.status.ok{background:var(--lo-bg);color:var(--turq-d)}.status.no{background:var(--hi-bg);color:var(--hi)}
  tr.mrow{cursor:pointer;transition:.12s}tr.mrow:hover td{background:#f6fafc}
  tr.mrow td .risktit{font-weight:600;color:var(--ink)}
  tr.mrow td .subtit{font-size:11px;color:var(--mut);margin-top:3px;display:flex;align-items:center;gap:6px}
  .cat{font-family:var(--disp);font-weight:700;font-size:9.5px;letter-spacing:.04em;border-radius:5px;padding:1px 6px}
  .chev{color:#c2d0dd;font-size:15px}tr.mrow:hover .chev{color:var(--petrol)}
  td.tcell{font-size:12px;color:var(--slate);line-height:1.4}
  /* drawer */
  .scrim{position:fixed;inset:0;background:rgba(20,32,46,.42);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:.2s;z-index:40}
  .scrim.on{opacity:1;pointer-events:auto}
  .scrim.center{display:flex;align-items:center;justify-content:center}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(480px,94vw);background:var(--card);border-left:1px solid var(--line);box-shadow:-24px 0 60px -30px rgba(20,32,46,.55);transform:translateX(101%);transition:transform .24s cubic-bezier(.4,0,.2,1);z-index:41;display:flex;flex-direction:column}
  .drawer.on{transform:none}
  .dhead{padding:17px 22px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:12px}
  .dhead .dt{flex:1;min-width:0}.dhead h3{font-family:var(--disp);font-size:16px;color:var(--mid);line-height:1.3}
  .dhead .dclose{cursor:pointer;color:var(--mut);font-size:20px;line-height:1;padding:2px 6px;border-radius:8px}.dhead .dclose:hover{background:#f0f4f8;color:var(--ink)}
  .dbody{padding:16px 22px 34px;overflow-y:auto;flex:1}
  .dsec{margin-bottom:20px}
  .dsec .st2{font-family:var(--disp);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--turq-d);margin-bottom:11px;display:flex;align-items:center;gap:10px}
  .dsec .st2::after{content:'';flex:1;height:1px;background:var(--line)}
  .field{margin-bottom:11px}
  .field>label{display:block;font-size:11px;color:var(--mut);margin-bottom:4px;font-weight:600}
  .field .inp{width:100%;border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-family:inherit;font-size:13px;color:var(--ink);background:#fff;resize:vertical}
  textarea.inp{min-height:38px;line-height:1.4}
  .field .inp:focus{outline:none;border-color:var(--petrol);background:#f8fbfd}
  .frow{display:flex;gap:10px}.frow .field{flex:1}
  .clsbox{display:flex;align-items:center;gap:13px;background:#f6f9fb;border-radius:11px;padding:11px 14px}
  .clsbox .big{font-family:var(--disp);font-weight:700;font-size:22px;color:#fff;border-radius:10px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;flex:none}
  .clsbox .cl{font-size:11px;color:var(--mut)}.clsbox .cl b{display:block;font-size:14px;color:var(--mid);font-family:var(--disp);margin-top:1px}
  .redu{margin-top:11px;font-size:12px;font-weight:600;border-radius:9px;padding:9px 12px;display:flex;align-items:center;gap:8px}
  .redu.down{background:var(--lo-bg);color:var(--turq-d)}.redu.flat{background:#eef2f6;color:var(--slate)}.redu.up{background:var(--hi-bg);color:var(--hi)}
  .htoggle{display:flex;gap:4px;background:#e9eef4;padding:3px;border-radius:9px;margin-bottom:12px;width:fit-content}
  .htoggle button{border:none;background:none;font-family:var(--disp);font-weight:600;font-size:11px;padding:5px 11px;border-radius:7px;color:var(--slate);cursor:pointer}
  .htoggle button.on{background:#fff;color:var(--petrol);box-shadow:0 2px 6px -3px rgba(34,48,63,.3)}
  /* modal escala */
  .mbox{background:var(--card);border-radius:16px;max-width:600px;width:92vw;padding:24px;max-height:88vh;overflow:auto;box-shadow:0 30px 80px -30px rgba(20,32,46,.6)}
  .mbox h3{font-family:var(--disp);color:var(--mid);font-size:19px;margin-bottom:3px}
  .mbox .msub{color:var(--mut);font-size:12.5px;margin-bottom:14px}
  .impsrc{background:#f2f7fb;border:1px solid var(--line);border-radius:9px;padding:8px 11px;font-size:12px;color:var(--slate);margin-bottom:8px}
  .impsrc b{color:var(--mid)}
  .impwarn{background:var(--med-bg);border:1px solid #edcf9e;border-radius:9px;padding:9px 12px;font-size:12px;color:#8a5a12;line-height:1.45;margin-bottom:6px}
  .mbox .mclose{float:right;cursor:pointer;color:var(--mut);font-size:20px;padding:2px 6px;border-radius:8px}.mbox .mclose:hover{background:#f0f4f8}
  .scaletbl{width:100%;border-collapse:collapse;font-size:12.5px;margin:6px 0 18px}
  .scaletbl th,.scaletbl td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top}
  .scaletbl th{background:#f6f9fb;font-family:var(--disp);color:var(--mid);font-size:11px;letter-spacing:.03em}
  .lvl{font-family:var(--disp);font-weight:700;color:#fff;border-radius:6px;padding:1px 8px;font-size:12px;display:inline-block}
  .mmatrix{display:grid;grid-template-columns:52px repeat(3,1fr);grid-auto-rows:46px;gap:5px;margin-top:6px}
  .mmatrix .mc{border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--disp);font-weight:700;font-size:14px}
  .mmatrix .mhh{font-size:10.5px;color:var(--mut);font-weight:600;display:flex;align-items:center;justify-content:center;text-align:center}
  /* ── Mapa geral (macro processos) ── */
  .viewbtn{width:100%;border:1px solid var(--line);background:var(--card);border-radius:14px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-weight:600;color:var(--mid);margin-bottom:10px;font-family:var(--disp);transition:.15s}
  .viewbtn:hover{border-color:#c6d4e0}.viewbtn.on{border-color:var(--petrol);background:#eef5f9}
  .viewbtn svg{width:18px;height:18px;stroke:var(--petrol);fill:none;stroke-width:1.8}
  .macro{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px 24px 20px}
  .macro-h{text-align:center;margin-bottom:16px}
  .macro-h h2{font-family:var(--disp);font-size:22px;color:var(--mid);letter-spacing:.01em;outline:none}
  .macro-h .un{font-family:var(--disp);font-size:14px;color:var(--petrol);font-weight:600;margin-top:2px;outline:none}
  .macro-h [contenteditable]:focus{background:#f2f7fb;border-radius:6px;outline:none}
  .rails{display:grid;grid-template-columns:38px 1fr 38px;gap:14px;align-items:stretch}
  .rail{border-radius:12px;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--petrol),var(--petrol-d))}
  .rail.out{background:linear-gradient(160deg,var(--turq),var(--turq-d))}
  .rail span{writing-mode:vertical-rl;transform:rotate(180deg);color:#fff;font-family:var(--disp);font-weight:600;font-size:10px;letter-spacing:.05em;text-transform:uppercase;text-align:center;line-height:1.35;padding:14px 0}
  .tiers{display:flex;flex-direction:column;gap:8px;min-width:0}
  .tier{background:#f5f8fb;border:1px solid var(--line);border-radius:13px;padding:14px 16px}
  .tier .tl{font-family:var(--disp);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);text-align:center;margin-bottom:13px;font-weight:700}
  .conn{display:flex;justify-content:center;color:#c2d0dd;font-size:14px;line-height:1;height:6px}
  .cbus{position:relative;display:flex;justify-content:space-around;height:24px;padding:0 46px;margin:1px 0}
  .cbus::before{content:'';position:absolute;left:9%;right:9%;top:50%;height:2px;background:#c4d2df;transform:translateY(-50%)}

}
function escolherImportProc(ip,mcr,missao,ipHit,mcrHit){
 function apply(op){aplicarNoProcesso((op==='ip'||op==='ambos')?ip:null,(op==='mcr'||op==='ambos')?mcr:null,missao,ipHit,mcrHit);}
 if(ip&&!mcr){apply('ip');return;}
 if(mcr&&!ip){apply('mcr');return;}
 var nip=0;['recursos','dono','maoDeObra','origem','entradas','atividades','saidas','destino','metodos','medicao'].forEach(function(k){if(ip[k])nip+=ip[k].length;});
 var box=document.getElementById('mbox');
 box.innerHTML='<span class="mclose" onclick="closeScale()">✕</span><h3>Importar para “'+esc(P().nome)+'”</h3><div class="msub">Encontrei a aba de IP ('+esc(ipHit?ipHit.name:'')+') e a MCR ('+esc(mcrHit?mcrHit.name:'')+'). O que trazer para este processo?</div>'+
  '<div style="display:flex;flex-direction:column;gap:10px;margin-top:4px">'+
   '<button class="btn pri" style="justify-content:flex-start" onclick="_impPick(\'ambos\')">Tudo — IP + MCR ('+nip+' itens de IP · '+mcr.length+' riscos)</button>'+
   '<button class="btn" style="justify-content:flex-start" onclick="_impPick(\'ip\')">Só a Interação de Processo ('+nip+' itens)</button>'+
   '<button class="btn" style="justify-content:flex-start" onclick="_impPick(\'mcr\')">Só a Matriz de Risco ('+mcr.length+' riscos)</button>'+
  '</div>';
 window._impCb=apply;document.getElementById('mscrim').classList.add('on');
}
function aplicarNoProcesso(ip,mcr,missao,ipHit,mcrHit){
 var p=P();var jaTem=((p.mcr&&p.mcr.length)||ipTem(p.ip));
 if(jaTem&&!confirm('Isso vai substituir o IP/MCR atual de “'+p.nome+'” pelos dados da planilha. Continuar?'))return;
 var partes=[];
 if(ip){p.ip=ip;if(missao)p.missao=missao;partes.push('IP'+(ipHit?(' · '+ipHit.name):''));}
 if(mcr){p.mcr=mcr;partes.push('MCR '+mcr.length+' riscos'+(mcrHit?(' · '+mcrHit.name):''));}
 salvar();aba=ip?'ip':'mcr';render();flash('Importado para “'+p.nome+'”: '+partes.join(' + ')+' ✓');
}
function importExcel(ev){
 var file=ev.target.files&&ev.target.files[0];ev.target.value='';if(!file)return;
 if(typeof XLSX==='undefined'){alert('A biblioteca de leitura de Excel não carregou (sem conexão?). Tente novamente.');return;}
 flash('Lendo a planilha…');
 comArquivo(file,function(wb,formas){
  // Com um processo aberto: procura em TODAS as abas a que corresponde a ele (por nome/código).
  var proc=(view==='proc')?P():null;var dip=null,dmcr=null;
  if(proc){
    var ipHit=findSheetFor(wb,proc,'ip');if(ipHit){var pr=parseIPaoa(ipHit.aoa,formas[ipHit.name]);if(pr&&ipTem(pr.ip)){pr.sheet=ipHit.name;dip=pr;}}
    var mcrHit=findSheetFor(wb,proc,'mcr');if(mcrHit){var mr=parseAoaMcr(mcrHit.aoa);if(mr&&mr.rows&&mr.rows.length){mr.sheet=mcrHit.name;dmcr=mr;}}
  }
  if(!dip)dip=detIP(wb,formas);
  if(!dmcr||!dmcr.rows||!dmcr.rows.length)dmcr=detMcr(wb);
  var ip=(dip&&ipTem(dip.ip))?dip.ip:null;var missao=dip?dip.missao:'';
  var mcr=(dmcr&&dmcr.rows&&dmcr.rows.length)?dmcr.rows:null;
  var procNome=(dmcr&&dmcr.procNome)||(dip&&dip.sheet)||'';
  var src={nome:procNome,ipSheet:(dip&&dip.sheet)||'',mcrSheet:(dmcr&&dmcr.sheet)||''};
  if(ip||mcr){escolherImport(ip,mcr,procNome,file,missao,src);return;}
  // Nada reconhecido diretamente → tenta IA como reforço.
  flash('Avaliando o documento com IA…');
  fetch('/api/importar-mcr',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({sheets:sheetsToCsv(wb)})})
   .then(function(r){return r.json();})
   .then(function(res){
     if(!res||!res.ok)throw new Error((res&&res.error)||'falha na IA');
     var aip=ipTem(res.ip)?normIpIA(res.ip):null;var amcr=(res.mcr&&res.mcr.length)?res.mcr.map(normRiscoIA):null;
     if(!aip&&!amcr){flash('');alert('Não encontrei Interação de Processo nem Matriz de Risco neste documento.');return;}
     escolherImport(aip,amcr,res.processo,file,(res.ip&&res.ip.missao)||'',{nome:res.processo||'',ipSheet:'',mcrSheet:''});
   })
   .catch(function(err){flash('');alert('Não consegui ler o documento automaticamente e a IA falhou ('+(err.message||err)+').\n\nConfira o GEMINI_API_KEY no servidor.');});
 });
}
/* ── Importar TUDO: lê todas as abas e cria/atualiza todos os processos ── */
function codeOfName(n){var m=norm(n).match(/(\d{2,4})/);return m?m[1]:'';}
function nomeOfTab(n){return String(n).replace(/^\s*(ip|mcr)[\s\-_]*\d+[\s\-_]*/i,'').replace(/[\-_]+/g,' ').trim();}
function importTudoExcel(ev){
 var file=ev.target.files&&ev.target.files[0];ev.target.value='';if(!file)return;
 if(typeof XLSX==='undefined'){alert('A biblioteca de leitura de Excel não carregou.');return;}
 flash('Lendo a planilha inteira…');
 comArquivo(file,function(wb,formas){
  var ipList=[],mcrList=[];
  wb.SheetNames.forEach(function(name){var aoa;try{aoa=XLSX.utils.sheet_to_json(wb.Sheets[name],{header:1,raw:false,defval:''});}catch(e){return;}
   var flat=aoa.map(function(r){return (r||[]).map(norm).join(' ');}).join(' ');
   var isIP=/^ip[\s\-]/.test(norm(name))||flat.indexOf('interacao de processo')>=0||(flat.indexOf('recursos')>=0&&flat.indexOf('missao do processo')>=0);
   var isMCR=(flat.indexOf('risco')>=0&&(flat.indexOf('consequenc')>=0||flat.indexOf('barreira')>=0));
   if(isIP)ipList.push({name:name,aoa:aoa});else if(isMCR)mcrList.push({name:name,aoa:aoa,used:false});
  });
  function bestMcr(ipName){var code=codeOfName(ipName);var toks=norm(nomeOfTab(ipName)).split(' ').filter(function(w){return w.length>=4;});var bi=-1,bs=0;mcrList.forEach(function(m,i){if(m.used)return;var sn=norm(m.name);var sc=0;if(code&&sn.indexOf(code)>=0)sc+=50;toks.forEach(function(t){if(sn.indexOf(t)>=0)sc+=30;});if(sc>bs){bs=sc;bi=i;}});return bs>=50?bi:-1;}
  var units=[];
  ipList.forEach(function(ipt){var pr=parseIPaoa(ipt.aoa,formas[ipt.name]);var ipData=(pr&&ipTem(pr.ip))?pr.ip:null;var mcr=null,procNome='';var mi=bestMcr(ipt.name);if(mi>=0){var mr=parseAoaMcr(mcrList[mi].aoa);if(mr&&mr.rows.length){mcr=mr.rows;procNome=mr.procNome;mcrList[mi].used=true;}}if(ipData||mcr)units.push({code:codeOfName(ipt.name),nome:procNome||nomeOfTab(ipt.name),ip:ipData,missao:pr?pr.missao:'',mcr:mcr});});
  mcrList.forEach(function(m){if(m.used)return;var mr=parseAoaMcr(m.aoa);if(mr&&mr.rows.length)units.push({code:codeOfName(m.name),nome:mr.procNome||nomeOfTab(m.name),ip:null,missao:'',mcr:mr.rows});});
  if(!units.length){flash('');alert('Não encontrei processos com conteúdo na planilha.');return;}
  if(!confirm('Importar '+units.length+' processos da planilha?\nProcessos com o mesmo código/nome serão atualizados; os demais serão criados.'))return;
  var criados=0,atualizados=0;
  units.forEach(function(u){var uc=(u.code||'').replace(/\D/g,'');
   var ex=state.processos.find(function(p){return (uc&&norm(p.codigo).replace(/\D/g,'')===uc)||norm(p.nome)===norm(u.nome);});
   if(ex){if(u.ip){ex.ip=u.ip;if(u.missao)ex.missao=u.missao;}if(u.mcr)ex.mcr=u.mcr;if(!ex.mcrMeta)ex.mcrMeta=novaMeta();atualizados++;}
   else{state.processos.push({id:uid('p'),codigo:u.code||'',nome:u.nome,missao:u.missao||'',ip:u.ip||novoIP(),mcrMeta:novaMeta(),mcr:u.mcr||[]});criados++;}
  });
  salvar();view='mapa';render();flash('Importados: '+criados+' novos, '+atualizados+' atualizados ✓');
 });
}
function aplicarImport(ip,mcr,procNome,file,missao){
 var nome=prompt('Nome do processo para importar'+(mcr?(' ('+mcr.length+' riscos'+(ip?' + IP':'')+')'):(ip?' (IP)':''))+':',procNome||file.name.replace(/\.[^.]+$/,''));
 if(nome==null)return;
 var cod=String(state.processos.length+1);while(cod.length<3)cod='0'+cod;
 var novo={id:uid('p'),codigo:cod,nome:(nome.trim()||'Importado'),missao:missao||(ip&&ip.missao)||'',ip:ip||novoIP(),mcrMeta:novaMeta(),mcr:mcr||[]};
 state.processos.push(novo);ativo=novo.id;aba=mcr?'mcr':'ip';salvar();render();
 flash('Importado: '+(ip?'IP':'')+(ip&&mcr?' + ':'')+(mcr?('MCR ('+mcr.length+')'):'')+' ✓');
}
function tokShare(a,b){a=norm(a);b=norm(b);function any(x,y){return x.split(' ').some(function(t){return t.length>=4&&y.indexOf(t)>=0;});}return any(a,b)||any(b,a);}
function escolherImport(ip,mcr,procNome,file,missao,src){
 var into=(view==='proc'&&P());
 function apply(op){var i=(op==='ip'||op==='ambos')?ip:null;var m=(op==='mcr'||op==='ambos')?mcr:null;if(into)aplicarNoProcesso(i,m,missao,null,null);else aplicarImport(i,m,procNome,file,missao);}
 if(!into){if(ip&&!mcr){apply('ip');return;}if(mcr&&!ip){apply('mcr');return;}}
 var nip=0;['recursos','dono','maoDeObra','origem','entradas','atividades','saidas','destino','metodos','medicao'].forEach(function(k){if(ip&&ip[k])nip+=ip[k].length;});
 var srcNome=(src&&src.nome)||'';
 var srcline=(src&&(srcNome||src.ipSheet||src.mcrSheet))?('<div class="impsrc">📄 Do arquivo'+(srcNome?': <b>'+esc(srcNome)+'</b>':'')+(src.ipSheet?(' · aba IP: '+esc(src.ipSheet)):'')+(src.mcrSheet?(' · aba MCR: '+esc(src.mcrSheet)):'')+'</div>'):'';
 var warn=(into&&srcNome&&!tokShare(P().nome,srcNome))?('<div class="impwarn">⚠ O arquivo parece ser do processo <b>“'+esc(srcNome)+'”</b>, diferente do aberto (<b>“'+esc(P().nome)+'”</b>). Confira antes de importar.</div>'):'';
 var btns='';
 if(ip&&mcr)btns+='<button class="btn pri" style="justify-content:flex-start" onclick="_impPick(\'ambos\')">Tudo — IP + MCR ('+nip+' itens de IP · '+mcr.length+' riscos)</button>';
 if(ip)btns+='<button class="btn'+((ip&&mcr)?'':' pri')+'" style="justify-content:flex-start" onclick="_impPick(\'ip\')">'+((ip&&mcr)?'Só a Interação de Processo':'Importar a Interação de Processo')+' ('+nip+' itens)</button>';
 if(mcr)btns+='<button class="btn'+((ip&&mcr)?'':' pri')+'" style="justify-content:flex-start" onclick="_impPick(\'mcr\')">'+((ip&&mcr)?'Só a Matriz de Risco':'Importar a Matriz de Risco')+' ('+mcr.length+' riscos)</button>';
 var box=document.getElementById('mbox');
 box.innerHTML='<span class="mclose" onclick="closeScale()">✕</span><h3>'+(into?('Importar para “'+esc(P().nome)+'”'):'Importar do documento')+'</h3><div class="msub">O que você quer trazer'+(into?' para este processo':'')+'?</div>'+srcline+warn+
  '<div style="display:flex;flex-direction:column;gap:10px;margin-top:12px">'+btns+'</div>';
 window._impCb=apply;document.getElementById('mscrim').classList.add('on');}
function _impPick(op){closeScale();var cb=window._impCb;window._impCb=null;if(cb)cb(op);}
function exportar(){var b=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='ip-mcr.json';a.click();}
try{if(window.self!==window.top)document.body.classList.add('embedded');}catch(e){document.body.classList.add('embedded');}
carregar();render();
</script>
